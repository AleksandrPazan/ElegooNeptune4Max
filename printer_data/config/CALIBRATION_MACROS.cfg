
# ============================================================================================================================
# 📐 ГРУППА: СЕРВИСНЫЙ КОМПЛЕКС АВТОМАТИЧЕСКИХ КАЛИБРОВОК ГЕОМЕТРИИ ПРИНТЕРА (ВНЕ ПРИНТ-СТАРТА)
# ============================================================================================================================

[gcode_macro twisting_the_axis_x]
description: 🟣 Сервисная калибровка компенсации перекоса по оси X (Фиолетовый монолит)
gcode:
    # --- 🟪 НАЧАЛО: Включаем фиолетовый монолит на всей каретке Stealthburner ---
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟣 Калибровка: Фиолетовый логотип в буфер
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🟣 Калибровка: Фиолетовое левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🟣 Калибровка: Фиолетовое правое сопло и шлем буфер

    M117 Heating bed to 60C...                                                     ; 💬 Вывод сообщения о подготовке стола в консоль
    M140 S60                                                                       ; 🔥 Подаем команду нагрева стола на тестовые 60°C
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=58 MAXIMUM=63                       ; ⏳ Жестко ждем стабилизации стола в коридоре тепла

    # Проверка статуса осей принтера перед началом физических перемещений
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                                                                        ; 🏠 Полный хоминг по всем осям, если координаты неизвестны
    {% elif 'z' not in printer.toolhead.homed_axes %}
        G28 Z                                                                      ; 🏠 Допарковываем только ось Z, если X и Y уже в доме
    {% else %}
        {% if printer.toolhead.position.z < 4.0 %}
            G90                                                                    ; 📐 Режим абсолютного позиционирования осей принтера
            G0 Z4 F600                                                             ; ↕️ Безопасно приподнимаем сопло на 4 мм над платформой
        {% endif %}
    {% endif %}

    # Контроль безопасной температуры сопла для проведения точного замера
    M104 S180                                                                      ; 🔥 Прогреваем сопло Rapido 2 до безопасных 180°C
    {% if printer.extruder.temperature > 185 %}
        M106 S255                                                                  ; 🌪️ Включаем обдув на максимум, если сопло перегрето
    {% endif %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=180 MAXIMUM=185                       ; ⏳ Ждем фиксации температуры сопла в узком коридоре
    M107                                                                           ; 🌪️ Намертво отключаем вентилятор обдува модели

    BED_MESH_CLEAR                                                                 ; 💾 Очищаем оперативную память от старой карты высот стола
    AXIS_TWIST_COMPENSATION_CALIBRATE AXIS=X SAMPLE_COUNT=3                        ; 🎯 Запуск встроенного алгоритма калибровки балки X Klipper
    
    # --- ФИНАЛ: Отключаем нагреватели. Свет НЕ меняется, остаётся Фиолетовым маркером успешного теста ---
       M104 S0                                                                        ; 🔥 Полностью отключаем нагревательный картридж сопла
    M140 S0                                                                        ; 🔥 Полностью отключаем силовой нагрев стола 420х420 мм
    M117 Calibration X Done. Heaters Off.                                          ; 💬 Вывод финального сообщения об успешном окончании теста
    # --- 🔵 ФИНАЛ: Возврат в простой (Вся голова горит вашим фирменным Синим) ---
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Сброс: Синий логотип в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🔵 Сброс: Синее левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🔵 Сброс: Синее правое сопло и шлем буфер


[gcode_macro twisting_the_axis_y]
description: 🟣 Сервисная калибровка компенсации перекоса по оси Y (Фиолетовый монолит)
gcode:
    # --- 🟪 НАЧАЛО: Включаем фиолетовый монолит на всей каретке Stealthburner ---
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟣 Калибровка: Фиолетовый логотип в буфер
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🟣 Калибровка: Фиолетовое левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🟣 Калибровка: Фиолетовое правое сопло и шлем буфер

    M117 Heating bed to 60C...                                                     ; 💬 Сообщение о подготовке платформы к калибровке осей
    M140 S60                                                                       ; 🔥 Подаем команду нагрева стола на тестовые 60°C
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=58 MAXIMUM=63                       ; ⏳ Ждем выхода стола на стабильную температуру замера

    # Проверка статуса осей принтера перед началом физических перемещений
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                                                                        ; 🏠 Полная парковка всех осей при необходимости
    {% elif 'z' not in printer.toolhead.homed_axes %}
        G28 Z                                                                      ; 🏠 Отдельный хоминг оси Z, если X и Y уже известны
    {% else %}
        {% if printer.toolhead.position.z < 4.0 %}
            G90                                                                    ; 📐 Режим абсолютного отсчета координат принтера
            G0 Z4 F600                                                             ; ↕️ Предварительный защитный подъем головы над столом
        {% endif %}
    {% endif %}

    # Контроль температурного режима сопла инструментальной головки
    M104 S180                                                                      ; 🔥 Прогреваем сопло Rapido 2 до безопасных 180°C
    {% if printer.extruder.temperature > 185 %}
        M106 S255                                                                  ; 🌪️ Включаем вентилятор обдува для ускорения остывания сопла
    {% endif %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=180 MAXIMUM=185                       ; ⏳ Точечно фиксируем температуру хотенда для теста
    M107                                                                           ; 🌪️ Намертво выключаем кулер обдува модели

    BED_MESH_CLEAR                                                                 ; 💾 Удаляем старую карту высот из оперативной памяти
    AXIS_TWIST_COMPENSATION_CALIBRATE AXIS=Y SAMPLE_COUNT=3                        ; 🎯 Запуск встроенного алгоритма калибровки балки Y Klipper
    
    # --- ФИНАЛ: Отключаем нагреватели. Свет НЕ меняется, остаётся Фиолетовым маркером успешного теста ---
       M104 S0                                                                        ; 🔥 Отключаем нагреватель экструдера инструментальной головы
    M140 S0                                                                        ; 🔥 Отключаем нагревательный элемент стола принтера
    M117 Calibration Y Done. Heaters Off.                                          ; 💬 Вывод финального сообщения об успешном окончании теста
    # --- 🔵 ФИНАЛ: Возврат в простой (Вся голова горит вашим фирменным Синим) ---
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Сброс: Синий логотип в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🔵 Сброс: Синее левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🔵 Сброс: Синее правое сопло и шлем буфер

[gcode_macro BED_SCREWS_CALCULATE]
description: 🟣 Сервисная автоматическая оценка наклона винтов стола по Eddy (Фиолетовый монолит)
gcode:
    # --- 🟪 НАЧАЛО: Включаем фиолетовый монолит на всей каретке Stealthburner ---
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟣 Калибровка: Фиолетовый логотип в буфер
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🟣 Калибровка: Фиолетовое левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🟣 Калибровка: Фиолетовое правое сопло и шлем буфер

    M117 Heating bed to 60C...                                                     ; 💬 Вывод сообщения о подготовке геометрии стола
    M140 S60                                                                       ; 🔥 Включаем силовой нагрев стола на рабочие 60°C
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=58 MAXIMUM=63                       ; ⏳ Ждем стабилизации расширения платформы 420х420 мм

    # Проверка статуса осей принтера перед началом физических перемещений
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                                                                        ; 🏠 Полный хоминг осей механики принтера перед тестом
    {% elif 'z' not in printer.toolhead.homed_axes %}
        G28 Z                                                                      ; 🏠 Допарковка только оси Z по датчику Eddy
    {% else %}
        {% if printer.toolhead.position.z < 4.0 %}
            G90                                                                    ; 📐 Абсолютная система координат перемещений
            G0 Z4 F600                                                             ; ↕️ Безопасный подъем сопла над уровнем PEI листа
        {% endif %}
    {% endif %}

    # Контроль температуры сопла для безопасного сканирования Eddy
    M104 S180                                                                      ; 🔥 Нагрев сопла до безопасных 180°C
    {% if printer.extruder.temperature > 185 %}
        M106 S255                                                                  ; 🌪️ Охлаждение сопла кулером, если температура завышена
    {% endif %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=180 MAXIMUM=185                       ; ⏳ Фиксируем температурный режим хотенда
    M107                                                                           ; 🌪️ Полностью выключаем вентилятор обдува модели

    SCREWS_TILT_CALCULATE                                                          ; 🎯 Встроенный автоматический замер наклона крутилок по Eddy

    # --- ФИНАЛ: Отключаем нагреватели. Свет НЕ меняется, остаётся Фиолетовым маркером успешного теста ---
       M104 S0                                                                        ; 🔥 Полностью обесточиваем нагревательный элемент сопла
    M140 S0                                                                        ; 🔥 Полностью обесточиваем нагревательный элемент стола
    M117 Screws Calculate Done. Heaters Off.                                       ; 💬 Вывод сообщения о завершении расчета винтов
    # --- 🔵 ФИНАЛ: Возврат в простой (Вся голова горит вашим фирменным Синим) ---
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Сброс: Синий логотип в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🔵 Сброс: Синее левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🔵 Сброс: Синее правое сопло и шлем буфер


[gcode_macro BED_SCREWS]
description: 🟣 Ручная регулировка крутилок стола по точкам бумажкой (Фиолетовый монолит)
gcode:
    # --- 🟪 НАЧАЛО: Включаем фиолетовый монолит на всей каретке Stealthburner ---
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟣 Калибровка: Фиолетовый логотип в буфер
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🟣 Калибровка: Фиолетовое левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🟣 Калибровка: Фиолетовое правое сопло и шлем буфер

    M117 Heating bed to 60C...                                                     ; 💬 Нагрев большого стола до 60°C
    M140 S60                                                                       ; 🔥 Подача силовой команды нагрева стола
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=58 MAXIMUM=63                       ; ⏳ Ожидание фиксации тепла платформы 420х420 мм

    # Проверка статуса осей принтера перед началом физических перемещений
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                                                                        ; 🏠 Парковка всех осей
    {% elif 'z' not in printer.toolhead.homed_axes %}
        G28 Z                                                                      ; 🏠 Парковка оси Z
    {% else %}
        {% if printer.toolhead.position.z < 4.0 %}
            G90                                                                    ; 📐 Абсолютные координаты для перемещений осей
            G0 Z4 F600                                                             ; ↕️ Защитный подъем сопла вверх
        {% endif %}
    {% endif %}

    # Контроль температуры сопла
    M104 S180                                                                      ; 🔥 Удержание сопла на безопасных 180°C
    {% if printer.extruder.temperature > 185 %}
        M106 S255                                                                  ; 🌪️ Охлаждение сопла вентилятором
    {% endif %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=180 MAXIMUM=185                       ; ⏳ Ждем удержания температуры Rapido 2
    M107                                                                           ; 🌪️ Отключаем вентилятор охлаждения модели
    
    BED_SCREWS_ADJUST                                                              ; 🎯 Интерактивный пошаговый объезд винтов стола по точкам

    # --- ФИНАЛ: Нагреватели отключит сама процедура или пользователь. Свет НЕ меняется, остаётся Фиолетовым ---
    M117 Bed Screws Adjust Active.                                                 ; 💬 Вывод сообщения о запуске интерактивного режима

                                   
  

[gcode_macro SET_Z_FROM_PROBE]
description: 🟢 Калибровка точности и повторяемости датчика Z (Часть 1: Прогрев и свет)
gcode:
    {% set called_from_start = params.CALLED_FROM_START|default(0)|int %}         ; 📌 Флаг источника вызова (0-вручную, 1-старт)
    
    {% if called_from_start == 1 %}
        {% set target_temp = printer.extruder.target|float %}                    ; 🌡️ Если из старта — берем текущую рабочую температуру модели
    {% else %}
        {% set target_temp = 210.0 %}                                            ; 🌡️ Если вызвано вручную — греем сопло до безопасных 210°C
    {% endif %}

    # --- АВТОМАТИЧЕСКИЙ ВЫБОР СВЕТА В НАЧАЛЕ ---
    {% if printer.extruder.temperature < (target_temp - 3) %}
        SET_LED LED=hotend_rgb RED=1.0 GREEN=0.0 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔴 Нагрев: Включаем красный цвет логотипа в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Нагрев: Включаем белый свет левого сопла в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Нагрев: Включаем белый свет правого сопла и шлем
    {% else %}
        # Сопло уже горячее и держит температуру -> Сразу заявляем свет печати: Синий логотип, Белые сопла
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Удержание: Синий цвет логотипа в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Удержание: Включаем белый свет левого сопла в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Удержание: Включаем белый свет правого сопла и шлем
    {% endif %}

    M104 S{target_temp}                                                           ; 🔥 Подаем команду на удержание или догрев экструдера на цель
    
    # Проверка статуса осей принтера перед выездом каретки Stealthburner в центр стола
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                                                                       ; 🏠 Полная парковка всех осей механизма, если они сброшены
    {% elif 'z' not in printer.toolhead.homed_axes %}
        G28 Z                                                                     ; 🏠 Допарковка только оси Z, если X и Y уже известны
    {% else %}
        {% if printer.toolhead.position.z < 4.0 %}
            G90                                                                   ; 📐 Переключение в абсолютную систему координат принтера
            G0 Z4 F600                                                            ; ↕️ Защитный подъем сопла на высоту 4 мм над уровнем стола
        {% endif %}
    {% endif %}
    M104 S{target_temp}                                                           ; 🔥 Подтверждаем целевую температуру сопла
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={target_temp - 3} MAXIMUM={target_temp + 10} ; ⏳ Жестко дожидаемся стабилизации сопла в коридоре
    M107                                                                          ; 🌪️ Железно выключаем вентилятор обдува модели

    G0 X210 Y210                                                                 ; 🚀 Выводим сопло точно в геометрический центр стола 420х420
    PROBE_ACCURACY METHOD=tap SAMPLES=3                                          ; 🎯 Запуск тройного теста повторяемости датчика методом Tap
    _RELOAD_Z_OFFSET_FROM_PROBE                                                  ; 🔒 Вызов скрытого макроса пересчета смещения Z-offset
    G0 Z5                                                                        ; ↕️ Автоматический отскок оси Z на высоту 5 мм над столом
    
    # --- УМНЫЙ ФИНАЛ МАКРОСА №3 ---
    {% if called_from_start == 1 %}
        # ФИНАЛ ПРИНТ-СТАРТА: Включаем рабочий свет печати (Синий логотип, Белые сопла) и едем на первый слой!
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Печать: Включаем синий цвет логотипа в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Печать: Включаем белый свет левого сопла в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Печать: Включаем белый свет правого сопла и шлем буфер
        M117 Probe Done. Ready to print.                                         ; 💬 Вывод сообщения о готовности к печати первого слоя
    {% else %}
        # Ручной вызов окончен — полностью гасим нагрев хотенда и включаем Синий монолит простоя
        M104 S0                                                                   ; 🔥 Полностью отключаем нагревательный картридж сопла
        M106 S255                                                                 ; 🌪️ Включаем обдув модели на максимум для ускорения
        TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=180                              ; ⏳ Дожидаемся остывания хотенда ниже безопасных 180°C
        M107                                                                      ; 🌪️ Полностью выключаем вентилятор обдува модели принтера
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Финал: Возвращаем синий цвет на логотип в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🔵 Финал: Возвращаем синий цвет на левое сопло в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🔵 Финал: Возвращаем синий цвет на правое сопло и шлем
        M117 Probe Accuracy Done. Heater Off.                                     ; 💬 Вывод финального текста об успешном окончании замера
    {% endif %}


[gcode_macro _RELOAD_Z_OFFSET_FROM_PROBE]
description: 🔒 Скрытый системный макрос пересчета динамического положения высоты Z
gcode:
    {% set Z = printer.toolhead.position.z %}                                    ; Считываем текущую физическую координату по оси Z
    SET_KINEMATIC_POSITION Z={Z - printer.probe.last_probe_position.z}           ; Корректируем виртуальный ноль Klipper по точке касания


# ============================================================================================================================
# 🌐 ГРУППА: АВТОМАТИЧЕСКИЙ ТЕСТ РЕЗОНАНСОВ INPUT SHAPER (ГОЛУБОЙ МОНОЛИТ)
# ============================================================================================================================

[gcode_macro SHAPER_CALIBRATE_AUTO]
description: 🌐 Автоматический тест резонансов осей Input Shaper по акселерометрам (Голубой монолит)
gcode:
    # --- 🌐 НАЧАЛО: Включаем голубой монолит на всей каретке Stealthburner ---
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.5 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🌐 Калибровка: Голубой логотип в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.5 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🌐 Калибровка: Голубое левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.5 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🌐 Калибровка: Голубое правое сопло и шлем буфер

    # Логика безопасной парковки осей перед тестом сильной тряски стола и каретки
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                                                                       ; 🏠 Полная парковка всех осей, если координаты неизвестны
    {% elif 'z' not in printer.toolhead.homed_axes %}
        G28 Z                                                                     ; 🏠 Допарковка только оси Z по датчику Eddy
    {% else %}
        {% if printer.toolhead.position.z < 5.0 %}
            G1 Z5.0 F600                                                          ; ↕️ Поднимаем сопло минимум на 5 мм для защиты PEI
        {% endif %}
    {% endif %}

    M117 Input Shaper testing...                                                   ; 💬 Вывод сообщения о начале теста резонансов в консоль
    SHAPER_CALIBRATE                                                              ; 🎯 Команда Klipper на запуск замера вибраций ADXL345

    # --- ФИНАЛ: Свет НЕ меняется, остаётся Голубым маркером успешного теста ---
    M117 Input Shaper Calibration Done!                                            ; 💬 Текст об успешном окончании теста на акселерометрах


# ============================================================================================================================
# 📐 ГРУППА: СЕРВИСНЫЙ КОМПЛЕКС АВТОМАТИЧЕСКИХ КАЛИБРОВОК ГЕОМЕТРИИ ПРИНТЕРА (ФИОЛЕТОВЫЙ МОНОЛИТ)
# ============================================================================================================================

[gcode_macro CALIBRATE_EDDY]
description: 🟣 Шаг 1: Автоматический подбор рабочего тока DRIVE_CURRENT чипа Eddy (Фиолетовый монолит)
gcode:
    # --- 🟪 НАЧАЛО: Включаем фиолетовый монолит на всей каретке Stealthburner ---
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟣 Калибровка: Фиолетовый логотип в буфер
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🟣 Калибровка: Фиолетовое левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🟣 Калибровка: Фиолетовое правое сопло и шлем буфер

    M117 Проверка осей...                                                          ; 💬 Текст в консоль перед началом позиционирования осей
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                                                                       ; 🏠 Физический Home по осям X, Y, Z перед калибровкой
    {% endif %}
    
    M117 Позиционирование Eddy...                                                 ; 💬 Текст в консоль перед движением головы в центр стола
    G90                                                                           ; 📐 Переключение в режим абсолютных координат
    G1 Z20 F1500                                                                  ; ↕️ Подъем оси Z на точную высоту 20 мм по методике
    G1 X210 Y210 F6000                                                            ; 🚀 Перемещение датчика Eddy ровно в центр стола 420х420
    
    M117 Подбор токов драйвера...                                                 ; 💬 Текст в консоль перед выполнением низкоуровневой команды
        LDC_CALIBRATE_DRIVE_CURRENT CHIP=my_eddy_probe                                ; 🎯 Расчет Klipper оптимального тока катушки Eddy за пару секунд
    M118 [СИСТЕМА]: Расчет токов Eddy завершен! Введите команду SAVE_CONFIG.        ; 💬 Финальная инструкция пользователю для сохранения данных
    # --- 🔵 ФИНАЛ: Возврат в простой (Вся голова горит вашим фирменным Синим) ---
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Сброс: Синий логотип в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🔵 Сброс: Синее левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🔵 Сброс: Синее правое сопло и шлем буфер

[gcode_macro CALIBRATE_EDDY_TAP_RAW]
description: 🟣 Комплексная трехэтапная калибровка Eddy Tap в центре стола (Фиолетовый монолит)
gcode:
    FLING_POOP_DUO
    # --- 🟪 НАЧАЛО: Включаем фиолетовый монолит на всей каретке Stealthburner ---
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟣 Калибровка: Фиолетовый логотип в буфер
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🟣 Калибровка: Фиолетовое левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🟣 Калибровка: Фиолетовое правое сопло и шлем буфер

    FLING_POOP_DUO CALLED_FROM_START=1                                            ; 🪥 Предварительная чистка сопла на щетке (свет внутри заблокирован)

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                                                                       ; 🏠 Полная парковка всех осей после работы на щетке
    {% elif 'z' not in printer.toolhead.homed_axes %}
        G28 Z                                                                     ; 🏠 Допарковка оси Z по датчику Eddy
    {% else %}
        {% if printer.toolhead.position.z < 4.0 %}
            G90                                                                   ; 📐 Переключение в режим абсолютных координат
            G0 Z4 F600                                                            ; ↕️ Защитный подъем сопла над поверхностью PEI
        {% endif %}
    {% endif %}
    
    G90                                                                           ; 📐 Переключение в режим absolute координат перемещений
    G0 X210 Y210 F9000                                                            ; 🚀 Перемещаем каретку Stealthburner ровно в центр стола
    M400                                                                          ; ⏳ Ждем полной остановки механики принтера

    # --- ТРЕХЭТАПНАЯ ОФИЦИАЛЬНАЯ КАЛИБРОВКА BTT EDDY TAP ---
    PROBE_EDDY_CURRENT_TAP_CALIBRATE TAP=guess                                    ; 🎯 Этап 1: Определение точки физического касания стола
    M400                                                                          ; ⏳ Обязательная пауза до завершения расчетов Klipper
    PROBE_EDDY_CURRENT_TAP_CALIBRATE TAP=refine                                   ; 🎯 Этап 2: Тонкое уточнение и фильтрация погрешностей замера
    M400                                                                          ; ⏳ Обязательная пауза до завершения расчетов Klipper
    PROBE_EDDY_CURRENT_TAP_CALIBRATE TAP=verify                                   ; 🎯 Этап 3: Финальная проверка стабильности полученных данных
    M400                                                                          ; ⏳ Обязательная пауза до завершения расчетов Klipper

    {action_respond_info("Калибровка Eddy Tap завершена успешно! Сохранение конфигурации...")} ; 💬 Информационное сообщение в консоль
    
    M104 S0                                                                       ; 🔥 Полностью отключаем нагревательный картридж сопла
    M140 S0                                                                       ; 🔥 Полностью отключаем силовой нагрев стола 420х420 мм
    
    # --- СИСТЕМНЫЙ ФИНАЛ: Перезагрузка прошивки сбросит свет в дефолтный Синий Standby ---
    SAVE_CONFIG                                                                   ; 💾 Запись параметров калибровки в printer.cfg с рестартом

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_BASE
gcode:
    # 1. Проверяем температуру стола. Если ниже 60, включаем нагрев и ждем.
    {% if printer.heater_bed.target < 60 %}
        M118 Нагрев стола до 60C перед сканированием...
        M190 S60
    {% endif %}
    
    # 2. Проверяем парковку осей (Homing), если не припаркованы — паркуем.
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    
    # 3. Запуск непрерывного сканирования (главный аргумент для Eddy)
    BED_MESH_CALIBRATE_BASE METHOD=rapid_scan
