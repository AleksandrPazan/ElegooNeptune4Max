##################################################################################################################################
#                                           ПОДКЛЮЧЕНИЕ СЛУЖЕБНЫХ ФАЙЛОВ КОНФИГУРАЦИИ
##################################################################################################################################
#
[include mainsail.cfg]                  # 📑 Конфигурация веб-интерфейса управления принтером Mainsail
[include BTT Eddy.cfg]                  # 📑 Базовые параметры низкоуровневой настройки датчика вихревых токов Eddy
[include steppers.cfg]                  # 📑 Настройки кинематических параметров шаговых двигателей и их драйверов
[include Macros.cfg]                    # 📑 Основной пользовательский пакет автоматических макросов (PRINT_START и др.)
[include CALIBRATION_MACROS.cfg]        # 📑 Закомментировано: дополнительные сервисные макросы для калибровки Eddy
[include shell_command.cfg]             # 📑 Подключение списка внешних системных команд Linux для оболочки Shell
[include CLEANING_MACROS.cfg] 
[include FILAMENT MACROS.cfg] 
#
##################################################################################################################################
#                                           ГЛОБАЛЬНЫЕ СИСТЕМНЫЕ НАСТРОЙКИ КЛИППЕРА
##################################################################################################################################
#
[save_variables]
filename: ~/printer_data/config/variables.cfg # 💾 Путь к файлу для сохранения глобальных переменных между перезагрузками

[exclude_object]                         # 🧼 Включение функции исключения объектов из печати на лету в случае их брака

[force_move]
enable_force_move: True                  # ⚙️ Разрешить принудительное перемещение осей принтера вручную до хоминга

[respond]
default_type: echo

[idle_timeout]
timeout: 600  ; Стандартный таймаут 10 минут для обычной жизни
gcode:
  # Проверяем, стоит ли принтер на паузе
  {% if printer.pause_resume.is_paused %}
    M117 Пауза: удержание нагрева и моторов активировано!
    ; Никаких команд на отключение (M104, M140, M84) здесь нет. 
    ; Принтер будет бесконечно держать температуру и оси во время паузы.
  {% else %}
    M117 Принтер простаивает: полное автоматическое отключение
    TURN_OFF_HEATERS ; Отключаем весь нагрев (сопло и стол)
    M84              ; Отключаем моторы
  {% endif %}

#
##################################################################################################################################
#                                           ГЕОМЕТРИЯ ПРИНТЕРА И ОГРАНИЧЕНИЯ ДИНАМИКИ
##################################################################################################################################
#
[printer]
kinematics: cartesian                    # 📐 Используемый тип кинематической схемы механики принтера (Cartesian / XY-Z)
max_velocity: 500                        # 🏎️ Максимально допустимая скорость холостых перемещений головы (мм/с)
max_accel: 5000                          # 🚀 Максимально допустимое ускорение перемещения каретки принтера (мм/с²)
max_z_velocity: 20                       # 🏎️ Максимально допустимая скорость холостых перемещений по оси Z (мм/с)
max_z_accel: 300                         # 🚀 Максимально допустимое ускорение движения стола/портала по оси Z (мм/с²)
square_corner_velocity: 5.0              # 📐 Скорость прохождения прямых углов без торможения в точках смены вектора
#
##################################################################################################################################
#                                           БЕЗОПАСНАЯ ПАРКОВКА ОСИ Z ПО ДАТЧИКУ
##################################################################################################################################
#
[safe_z_home]
home_xy_position: 210, 210               # 🎯 Координаты X, Y (физический центр стола) для безопасного замера нуля оси Z
speed: 50.0                              # 🏎️ Скорость, с которой инструментальная головка едет в точку замера Z (мм/с)
z_hop: 5                                 # 🛫 Безопасный предварительный подъем оси Z на 5 мм перед поиском дома осей X и Y
z_hop_speed: 15.0                        # 🏎️ Скорость (в мм/с), с которой перемещается ось Z во время защитного отскока
move_to_previous: False                  # 🧭 Возвращать ли оси X и Y назад в старую координату после успешного хоминга Z
#
##################################################################################################################################
#                                           ТОЧКИ РУЧНОЙ РЕГУЛИРОВКИ ВИНТОВ СТОЛА (ПО БУМАЖКЕ)
##################################################################################################################################
#
[bed_screws]
screw1: 30, 30                           # 📍 Координаты сопла над передним левым регулировочным винтом стола
screw2: 390, 30                          # 📍 Координаты сопла над передним правым регулировочным винтом стола
screw3: 390, 210                         # 📍 Координаты сопла над боковым правым регулировочным винтом стола
screw4: 390, 390                         # 📍 Координаты сопла над задним правым регулировочным винтом стола
screw5: 30, 390                          # 📍 Координаты сопла над задним левым регулировочным винтом стола
screw6: 30, 210                          # 📍 Координаты сопла над боковым левым регулировочным винтом стола
horizontal_move_z: 2                     # 🛫 Высота безопасного подъема оси Z при переездах между винтами (мм)
#
##################################################################################################################################
#                                           АВТОМАТИЧЕСКИЙ РАСЧЕТ НАКЛОНА СТОЛА ПО ДАТЧИКУ EDDY
##################################################################################################################################
#
[screws_tilt_adjust]
screw1: 210, 188.58    
screw1_name: center bed mount # 🎯 Базовый центр стола (Датчик Eddy ровно в X=210, Y=210)

screw2: 32.5, 377.05
screw2_name: rear left screw # ⚙️ Крутилка задняя левая
screw3: 32.5, 194.55
screw3_name: side left screw # ⚙️ Крутилка боковая левая (средняя)
screw4: 32.5, 12.05
screw4_name: front left screw # ⚙️ Крутилка передняя левая
screw5: 397.5, 12.05
screw5_name: front right screw # ⚙️ Крутилка передняя правая
screw6: 397.5, 194.55
screw6_name: side right screw # ⚙️ Крутилка боковая правая (средняя)
screw7: 397.5, 377.05
screw7_name: rear right screw # ⚙️ Крутилка задняя правая

horizontal_move_z: 2
speed: 100
screw_thread: CW-M4

#
##################################################################################################################################
#                                           НАСТРОЙКА КОМПЕНСАЦИИ СКРУЧИВАНИЯ ОСЕЙ (AXIS TWIST COMPENSATION)
##################################################################################################################################
#
[axis_twist_compensation]
speed: 50                                # 🏎️ Скорость холостых перемещений головы между точками замера калибровки (мм/с)
horizontal_move_z: 2                     # 🛫 Высота безопасного подъема оси Z при переездах между точками (мм)

# --- 📐 Параметры для компенсации скручивания по оси X ---
calibrate_start_x: 20                    # 📉 Минимальная стартовая координата X для запуска замера профиля балки
calibrate_end_x: 400                     # 📈 Максимальная конечная координата X для завершения замера профиля балки
calibrate_y: 210                         # 🎯 Фиксированная координата Y для проведения теста (рекомендуется центр стола)

# --- 📐 Параметры для компенсации скручивания по оси Y ---
calibrate_start_y: 20                    # 📉 Минимальная стартовая координата Y для запуска замера профиля балки
calibrate_end_y: 400                     # 📈 Максимальная конечная координата Y для завершения замера профиля балки
calibrate_x: 210                         # 🎯 Фиксированная координата X для проведения теста (рекомендуется центр стола)
#
##################################################################################################################################
#                                           КОНФИГУРАЦИЯ СВЯЗИ С МИКРОКОНТРОЛЛЕРАМИ (МСU CANBUS)
##################################################################################################################################
#
# --- 🔌 Главная системная плата BTT Manta M8P V2 ---
[mcu]
canbus_uuid: c052b483ec08                # 🆔 Уникальный идентификатор шины CAN для микроконтроллера платы Manta

# --- 🔌 Инструментальная плата головы EBB SB2209 CAN (RP2040) ---
[mcu EBBCan]
canbus_uuid: bf79277ec48b                # 🆔 Уникальный идентификатор шины CAN для микроконтроллера платы головы EBB

# --- 🔌 Контроллер индукционного датчика BTT Eddy ---
[mcu eddy]
canbus_uuid: 59ae0ca9769b                # 🆔 Уникальный идентификатор шины CAN для микроконтроллера платы датчика Eddy
#
##################################################################################################################################
#                                           МОНИТОРИНГ ТЕМПЕРАТУРЫ СИСТЕМНЫХ КОМПОНЕНТОВ
##################################################################################################################################
#
# --- 🌡️ Датчик температуры одноплатного компьютера CB2 ---
[temperature_sensor CB2]
sensor_type: temperature_host            # 🖥️ Тип датчика: процессор управляющего хоста (Raspberry / Orange / Linux)
#sensor_pin:                             # 📌 Закомментировано: физический пин аналогового входа хоста не требуется
min_temp: 10                             # ❄️ Минимальная рабочая температура датчика хоста (°C)
max_temp: 100                            # 🔥 Максимальная аварийная температура датчика хоста (°C)
#
##################################################################################################################################
#
# --- 🌡️ Датчик температуры процессора главной платы STM32 ---
[temperature_sensor STM32H723]
sensor_type: temperature_mcu             # 🔌 Тип датчика: встроенный кристалл основного микроконтроллера платы Manta
#sensor_pin:                             # 📌 Закомментировано: внутренний пин ядра опрашивается автоматически
min_temp: 10                             # ❄️ Минимальная рабочая температура процессора платы (°C)
max_temp: 100                            # 🔥 Максимальная аварийная температура процессора платы (°C)
#
##################################################################################################################################
#
# --- 🌡️ Датчик температуры инструментальной платы EBB SB2209 ---
[temperature_sensor EBB_SB2209]
sensor_type: Generic 3950                # 📈 Тип датчика: стандартный термистор контроля нагрева компонентов головы
sensor_pin: EBBCan:gpio28                # 📌 Ножка аналогового входа термистора на микроконтроллере EBB SB2209
min_temp: 10                             # ❄️ Минимальная рабочая температура платы головы (°C)
max_temp: 100                            # 🔥 Максимальная аварийная температура платы головы (°C)
#
##################################################################################################################################
#                                           НАСТРОЙКА НАГРЕВАТЕЛЬНОГО СТОЛА ПРИНТЕРА
##################################################################################################################################
#
[heater_bed]
heater_pin: PA0                          # 📌 Ножка управления силовым ключом (MOSFET) нагревательного элемента стола
sensor_pin: PB1                          # 📌 Ножка аналогового входа для подключения термистора стола (разъем TB)
sensor_type: NTC 100K MGB18-104F39050L32 # 📈 Модель используемого термистора для точного контроля температуры стола
min_temp: 0                              # ❄️ Минимальный аварийный температурный порог стола (°C)
max_temp: 120                            # 🔥 Максимальный аварийный температурный порог стола (°C)
max_power: 1.0                           # 🔌 Максимальная выдаваемая мощность обогревателя стола (1.0 = 100%)
control: pid                             # 🧮 Алгоритм пропорционально-интегрально-дифференциального регулирования нагрева
pid_kp: 75.397                           # 📐 Пропорциональный коэффициент контура PID калибровки стола
pid_ki: 0.823                            # 📐 Интегральный коэффициент контура PID калибровки стола
pid_kd: 1727.531                         # 📐 Дифференциальный коэффициент контура PID калибровки стола
#
##################################################################################################################################
#                                           ПРОВЕРКА И АВАРИЙНАЯ ЗАЩИТА ТЕРМОДАТЧИКОВ
##################################################################################################################################
#                                        
[verify_heater extruder]                 
max_error: 120                           # 🛑 Предел суммарной накопленной температурной погрешности хотенда до ухода в ошибку
check_gain_time: 120                     # ⏳ Время (в секундах) на проверку динамики роста температуры экструдера
hysteresis: 50                           # 📉 Допустимый коридор температурных колебаний хотенда (°C)
heating_gain: 2                          # 📈 Минимальный требуемый прирост температуры в градусах за контрольный промежуток времени
#
[verify_heater heater_bed]
max_error: 120                           # 🛑 Предел суммарной накопленной температурной погрешности стола до ухода в ошибку
#check_gain_time: 120                    # ⏳ Закомментировано: старое заводское время допуска
check_gain_time: 360                     # ⏳ Увеличенное время допуска (в сек) для медленного прогрева больших столов
hysteresis: 10                           # 📉 Допустимый коридор температурных колебаний нагревательного стола (°C)
heating_gain: 2                          # 📈 Минимальный требуемый прирост температуры стола в градусах за контрольный промежуток
#
##################################################################################################################################
#                                           ВЕНТИЛЯТОР ОБДУВА МОДЕЛИ (PART COOLING FAN)
##################################################################################################################################
#
[fan]
pin: EBBCan:gpio13                        # 📌 Выходной управляющий контакт вентилятора на плате инструментальной головы EBB
max_power: 1.0                            # 🔌 Максимальная выдаваемая мощность вентилятора обдува детали (1.0 = 100%)
shutdown_speed: 0                         # 🛑 Скорость вращения вентилятора при переходе микроконтроллера в состояние ошибки
cycle_time: 0.05                          # ⏳ Время одного цикла ШИМ в секундах (50 миллисекунд для программного ШИМ)
#hardware_pwm: False                      # ⚙️ Закомментировано: использование аппаратного ШИМ вместо программного
#kick_start_time: 0.100                   # 🚀 Закомментировано: время пикового импульса для надежного старта крыльчатки (сек)
#off_below: 0.0                           # 📉 Закомментировано: минимальный порог сигнала, ниже которого вентилятор выключается
#tachometer_pin: EBBCan:gpio12            # 📌 Закомментировано: пин датчика оборотов вентилятора (тахометра)
#tachometer_ppr: 2                        # 🔢 Закомментировано: количество импульсов сигнала тахометра на один оборот
#tachometer_poll_interval: 0.0015         # ⏳ Закомментировано: период опроса вывода тахометра в секундах
#
##################################################################################################################################
#                                           ВЕНТИЛЯТОР ОХЛАЖДЕНИЯ РАДИАТОРА ХОТЕНДА (HOTEND FAN)
##################################################################################################################################
#
[heater_fan hotend_fan]                 
pin: EBBCan:gpio14                       # 📌 Выходной управляющий контакт вентилятора на плате инструментальной головы EBB
heater: extruder                         # 🔥 Имя нагревателя, за температурой которого следит данный вентилятор
heater_temp: 50.0                        # 🌡️ Температура хотенда (°C), выше которой вентилятор автоматически включается
cycle_time: 0.1                          # ⏳ Время одного цикла ШИМ в секундах (100 миллисекунд для программного ШИМ)
max_power: 1.0                           # 🔌 Максимально доступный лимит мощности для ШИМ-управления (1.0 = 100%)
shutdown_speed: 1.0                      # 🛑 Аварийная скорость вращения на полную мощность при уходе прошивки в ошибку
fan_speed: 0.7                           # ⚙️ Рабочая скорость вращения вентилятора при активном нагреве (0.7 = 70%)
#
##################################################################################################################################
#                                           ВЕНТИЛЯТОР ОХЛАЖДЕНИЯ ОТСЕКА ЭЛЕКТРОНИКИ (MCU / HOST FAN)
##################################################################################################################################
#
[temperature_fan MCU]
pin: PA2                                 # 📌 Выходной управляющий контакт вентилятора на главной плате Manta
tachometer_pin: PC1                      # 📌 Пин датчика оборотов вентилятора (тахометра) для контроля вращения
max_power: 1.0                           # 🔌 Максимально доступный лимит мощности для ШИМ-управления (1.0 = 100%)
shutdown_speed: 1                        # 🛑 Аварийная скорость вращения на полную мощность при уходе прошивки в ошибку
cycle_time: 0.0003                       # ⏳ Время одного цикла ШИМ в секундах (ультра-быстрый ШИМ для 4-pin кулеров)
tachometer_ppr: 2                        # 🔢 Количество импульсов сигнала тахометра вентилятора на один оборот
tachometer_poll_interval: 0.0015         # ⏳ Период опроса вывода тахометра в секундах для расчета оборотов RPM
sensor_type: temperature_host            # 🖥️ Тип температурного датчика: процессор управляющего хоста (CB2)
#sensor_pin:                             # 📌 Закомментировано: физический пин аналогового входа хоста не требуется
control: pid                             # 🧮 Алгоритм пропорционально-интегрально-дифференциального регулирования оборотов
pid_Kp: 24.328                           # 📐 Пропорциональный коэффициент контура PID калибровки вентилятора
pid_Ki: 1.908                            # 📐 Интегральный коэффициент контура PID калибровки вентилятора
pid_Kd: 77.543                           # 📐 Дифференциальный коэффициент контура PID калибровки вентилятора
#max_delta: 2.0                          # 📉 Закомментировано: шаг гистерезиса для двухпозиционного метода управления watermark
min_temp: 0                              # ❄️ Минимальный аварийный температурный порог для датчика хоста (°C)
max_temp: 100                            # 🔥 Максимальный аварийный температурный порог для датчика хоста (°C)
target_temp: 40.0                        # 🎯 Целевая температура процессора (°C), которую стремится удерживать кулер
min_speed: 0.4                           # ⚙️ Минимальная базовая скорость вращения вентилятора (0.4 = 40% мощности)
#
##################################################################################################################################
#                                           КОНФИГУРАЦИЯ ЭКСТРУДЕРА ПРИНТЕРА (EXTRUDER)
##################################################################################################################################
#
# --- ⚙️ Параметры шагового двигателя экструдера ---
[extruder]
step_pin: EBBCan:gpio18                  # 📌 GPIO pin шагового двигателя на плате инструментальной головы EBB
dir_pin: EBBCan:gpio19                  # 🔄 Направление вращения двигателя (!-знак меняет направление двигателя)
enable_pin: !EBBCan:gpio17               # 🔌 Pin-включение двигателя (не трогать "!")
full_steps_per_rotation: 200             # ⚙️ Импульсов на оборот (двигатель 1.8°: 200, двигатель 0.9°: 400)
microsteps: 16                           # 🔢 Количество микрошагов на один шаг двигателя экструдера
gear_ratio: 50:10                        # ⚙️ Передаточное число механического редуктора подающего механизма
rotation_distance: 22.6789511            # 📏 Длина окружности подающей шестерни в мм для расчета шагов подачи
nozzle_diameter: 0.400                   # 🎚️ Диаметр установленного сопла печатающей головки (в мм)
filament_diameter: 1.750                 # 🧵 Номинальный диаметр используемой нити филамента (в мм)
max_extrude_only_distance: 400           # 📏 Лимит максимальной длины одиночной подачи или извлечения прутка (мм)
#
##################################################################################################################################
#                                           НАГРЕВАТЕЛЬНЫЙ ЭЛЕМЕНТ И ТЕРМОКОНТРОЛЬ ХОТЕНДА
##################################################################################################################################
#
heater_pin: EBBCan:gpio7                 # 📌 Выходной силовой контакт управления нагревательным картриджем хотенда
#control: pid                            # 🧮 Способ управления нагревом хотенда (ПИД-регулятор)
#pid_Kp: 24.328                          # 📐 Пропорциональный параметр ПИД-регулятора
#pid_Ki: 1.908                           # 📐 Интегральный параметр ПИД-регулятора
#pid_Kd: 77.543                          # 📐 Производный параметр ПИД-регулятора
min_temp: -20                            # ❄️ Минимальный аварийный температурный порог хотенда (°C)
max_temp: 350                            # 🔥 Максимальный аварийный температурный порог хотенда (°C)
min_extrude_temp: 170                    # 🛡️ Защита от холодной экструзии: блокировка подачи при температуре ниже заданной (°C)
pressure_advance: 0.05                   # 🧵 Значение компенсации давления филамента в сопле (Pressure Advance)
pressure_advance_smooth_time: 0.040      # ⏳ Время сглаживания при расчете динамического изменения давления (в секундах)

# --- 📈 Параметры штатного датчика температуры хотенда ---
sensor_type: PT1000                      # 📊 Высокоточный тип используемого датчика температуры (резистивный PT1000)
sensor_pin: EBBCan:gpio27                # 📌 Ножка подключения аналогового сигнала температурного датчика хотенда
pullup_resistor: 4700                    # ⚙️ Сопротивление подтягивающего резистора на плате (стандартное 4.7 кОм)
smooth_time: 3.0                         # ⏳ Время сглаживания показаний термистора для фильтрации электрических помех (сек)

# --- 📈 Альтернативный датчик температуры на чипе MAX31865 (Закомментирован) ---
#sensor_type: MAX31865                   # Закомментировано: высокоточный контроллер датчиков RTD (PT100/PT1000)
#sensor_pin: EBBCan:gpio9                # Закомментировано: пин выбора чипа CS для SPI-управления MAX31865
#spi_software_sclk_pin: EBBCan:gpio10    # Закомментировано: программный пин тактовой частоты SPI (SCLK)
#spi_software_mosi_pin: EBBCan:gpio8    # Закомментировано: программный пин передачи данных SPI (MOSI)
#spi_software_miso_pin: EBBCan:gpio11    # Закомментировано: программный пин приема данных SPI (MISO)
#rtd_nominal_r: 100                      # Закомментировано: номинальное сопротивление сенсора при 0°C (100 Ом для PT100)
#rtd_reference_r: 430                    # Закомментировано: сопротивление эталонного резистора на плате усилителя
#rtd_num_of_wires: 2                     # Закомментировано: схема подключения измерительных проводов датчика (2-проводная)

##################################################################################################################################
#                                           ДРАЙВЕР ШАГОВОГО ДВИГАТЕЛЯ ЭКСТРУДЕРА
##################################################################################################################################
#
[tmc2209 extruder]
uart_pin: EBBCan:gpio20                  # 📌 Коммуникационный порт привода UART на плате инструментальной головы EBB
run_current: 0.75                        # ⚡ Значение рабочего тока двигателя экструдера в Амперах (0.75А = 750мА)
stealthchop_threshold: 0                 # 🤫 Режим stealthChop отключен (0 = всегда в режиме максимального момента SpreadCycle)
#
##################################################################################################################################
#                                           КОМПЕНСАЦИЯ РЕЗОНАНСОВ ПРИНТЕРА (INPUT SHAPER)
##################################################################################################################################
#          
[input_shaper]
#shaper_type_x: zv                        # Закомментировано: тип алгоритма гашения вибраций для оси X
#shaper_freq_x: 116.2                     # Закомментировано: резонансная частота оси X (Гц)
#shaper_type_y: zv                        # Закомментировано: тип алгоритма гашения вибраций для оси Y
#shaper_freq_y: 38.8                      # Закомментировано: резонансная частота оси Y (Гц)
#damping_ratio_x: 0.1                     # Закомментировано: коэффициент демпфирования колебаний оси X (по умолчанию 0.1)
#damping_ratio_y: 0.1                     # Закомментировано: коэффициент демпфирования колебаний оси Y (по умолчанию 0.1)
#
##################################################################################################################################
#                                           АКСЕЛЕРОМЕТРЫ ДЛЯ АВТОМАТИЧЕСКОГО ЗАМЕРА РЕЗОНАНСОВ
##################################################################################################################################
#
# --- 📊 Акселерометр оси Y (установлен на нагревательном столе) ---
[adxl345 y]
cs_pin: PA15                             # 📌 Пин выбора чипа (Chip Select) SPI для акселерометра оси Y
spi_software_sclk_pin: PC10              # 🔌 Программный пин тактовой частоты шины SPI (SCLK)
spi_software_mosi_pin: PC12              # 🔌 Программный пин передачи данных шины SPI (MOSI)
spi_software_miso_pin: PC11              # 🔌 Программный пин приема данных шины SPI (MISO)
axes_map: z,-y,x                         # 🧭 Карта переназначения физических осей чипа под реальные направления принтера

# --- 📊 Акселерометр оси X (встроен в плату инструментальной головы EBB) ---
[adxl345 x]
cs_pin: EBBCan:gpio1                     # 📌 Пин выбора чипа (Chip Select) SPI для акселерометра оси X
spi_software_sclk_pin: EBBCan:gpio2      # 🔌 Программный пин тактовой частоты шины SPI (SCLK)
spi_software_mosi_pin: EBBCan:gpio0      # 🔌 Программный пин передачи данных шины SPI (MOSI)
spi_software_miso_pin: EBBCan:gpio3      # 🔌 Программный пин приема данных шины SPI (MISO)
axes_map: -x,-y,-z                       # 🧭 Карта переназначения физических осей чипа под реальные направления принтера
#
##################################################################################################################################
#                                           ПАРАМЕТРЫ ТЕСТИРОВАНИЯ РЕЗОНАНСОВ ПРИНТЕРА
##################################################################################################################################
#          
[resonance_tester]
probe_points: 215, 215, 20               # 🎯 Измерительная точка для проверки резонансов (физический центр стола по X, Y и Z)
accel_chip_x: adxl345 x                  # 📊 Имя используемого акселерометра для замера вибраций по оси X
accel_chip_y: adxl345 y                  # 📊 Имя используемого акселерометра для замера вибраций по оси Y
#
##################################################################################################################################
#                                           АДРЕСНАЯ СВЕТОДИОДНАЯ ПОДСВЕТКА ХОТЕНДА (NEOPIXEL)
# ============================================================================================================================
# 💡 ГРУППА: АДРЕСНАЯ СВЕТОДИОДНАЯ ПОДСВЕТКА ХОТЕНДА MELLOW VORON STEALTHBURNER
# ============================================================================================================================

[neopixel hotend_rgb]
pin: EBBCan:gpio16
chain_count: 3      # 1- светодиод логотип, 2 и 3 светодиод подсветка сопла
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 1.0
initial_WHITE: 0.0









##################################################################################################################################
#                                           ПИН УПРАВЛЕНИЯ СВЕТОДИОДНОЙ ПОДСВЕТКОЙ КОРПУСА ПРИНТЕРА
##################################################################################################################################
#
[output_pin POWER_LED]
pin: PA1                                 
#pwm: False                              
value: 1                                 # 🌟 Меняем на 1: теперь подсветка включается сама при старте принтера
shutdown_value: 0                        

[gcode_macro _TOGGLE_POWER_LED]
gcode:
    # Если свет горит (> 0), выключаем его (0). Иначе — включаем на полную (1)
    {% if printer["output_pin POWER_LED"].value > 0 %}
        SET_PIN PIN=POWER_LED VALUE=0
        M117 LED Off
    {% else %}
        SET_PIN PIN=POWER_LED VALUE=1
        M117 LED On
    {% endif %}

