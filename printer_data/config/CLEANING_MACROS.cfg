# ============================================================================================================================
# 🧼 МАКРОС №1: АВТОМАТИЧЕСКАЯ ОЧИСТКА СОПЛА И СБРОС ПЛАСТИКА (ЧАСТЬ 1)
# ============================================================================================================================

[gcode_macro FLING_POOP_DUO]
description: 🟠 Намыв капель и отстрел в ведро (Часть 1: Подготовка и нагрев)
gcode:
    {% set called_from_start = params.CALLED_FROM_START|default(0)|int %}         ; 📌 Флаг источника вызова (0-вручную, 1-старт)

    # ---------------- 📐 Координаты и Настройки ----------------
    {% set purge_x = 5.0 %}                                                       ; 🧭 Точка стола по оси X для выдавливания пластика
    {% set purge_y_start = 5.0 %}                                                 ; 🧭 Стартовая координата оси Y для первой капли
    {% set y_step = 15.0 %}                                                       ; 📐 Шаг смещения каретки по Y между каплями
    {% set purge_z_wait = 2.0 %}                                                  ; ↕️ Высота сопла над столом при ожидании нагрева
    {% set purge_z_start = 0.3 %}                                                 ; ↕️ Высота первого слоя капли для зацепа за PEI
    {% set purge_z_end = 6.67 %}                                                  ; ↕️ Высота подъема сопла в конце намыва капли
    {% set fling_x = -15.0 %}                                                     ; 🎯 Финальная точка прыжка каретки для удара ножа
    {% set fling_speed = 36000 %}                                                 ; ⚡ Сверхвысокая скорость удара ножа (600 мм/с)
    {% set purge_temp = 255 %}                                                    ; 🔥 Рабочая температура сопла для продувки прутка
    {% set cool_temp = 180 %}                                                     ; ❄️ Остывание сопла перед финишным ударом ножа
    {% set poop_len = 90.0 %}                                                     ; 🧵 Объем выдавливания филамента на одну каплю
    {% set purge_speed = 39 %}                                                    ; ⚙️ Скорость подачи пластика под редуктор экструдера

    {% set y_poop1 = purge_y_start %}                                             ; 🧮 Расчет координаты Y для формирования капли №1
    {% set y_poop2 = purge_y_start + y_step %}                                    ; 🧮 Расчет координаты Y для формирования капли №2

    SAVE_GCODE_STATE NAME=fling_poop_state                                       ; 💾 Сохраняем текущие координаты и режимы принтера

    # --- АВТОМАТИЧЕСКИЙ ВЫБОР СВЕТА В НАЧАЛЕ ---
    {% if printer.extruder.temperature < (purge_temp - 3) %}
        SET_LED LED=hotend_rgb RED=1.0 GREEN=0.0 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔴 Нагрев: Включаем красный цвет логотипа в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Нагрев: Включаем белый свет левого сопла в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Нагрев: Включаем белый свет правого сопла и шлем буфер
    {% else %}
        SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟠 Удержание: Оранжевый цвет логотипа в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Удержание: Белый свет левого сопла в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Удержание: Белый свет правого сопла и шлем буфер
    {% endif %}

    # Проверка статуса осей принтера перед началом физических перемещений
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                                                                       ; 🏠 Полная парковка всех осей, если координаты неизвестны
    {% elif 'z' not in printer.toolhead.homed_axes %}
        G28 Z                                                                     ; 🏠 Допарковка только оси Z, если X и Y уже в доме
    {% else %}
        {% if printer.toolhead.position.z < 4.0 %}
            G90                                                                   ; 📐 Включаем абсолютную систему координат перемещений
            G0 Z4 F600                                                            ; ↕️ Безопасно приподнимаем сопло на 4 мм над столом
        {% endif %}
    {% endif %}

    G90                                                                           ; 📐 Включаем режим абсолютных координат осей принтера
    G1 Z{purge_z_wait + 5.0} F3000                                                ; ↕️ Выполняем безопасный предварительный подъем оси Z
    G1 X{purge_x} Y{y_poop1} F9000                                                ; 🚀 Быстро вывозим каретку на точку первой капли X/Y
    G1 Z{purge_z_wait} F1500                                                      ; ↕️ Опускаем сопло на заданную высоту ожидания прогрева
    M117 Heating to {purge_temp}C...                                              ; 💬 Вывод сообщения о подготовке экструдера к продувке
    M104 S{purge_temp}                                                            ; 🔥 Подаем силовую команду на нагрев хотенда до 255°C
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={purge_temp - 3} MAXIMUM={purge_temp + 10} ; ⏳ Жестко дожидаемся стабилизации сопла в коридоре тепла
    
    # Нагрев успешно завершен -> Переключаем голову в Оранжевый логотип и Белые сопла
    SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟠 Намыв: Оранжевый цвет логотипа в буфер обмена
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Намыв: Белый свет левого сопла в буфер обмена
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Намыв: Белый свет правого сопла и отправка буфера

    M83                                                                           ; ⚙️ Переводим счетчик экструдера в относительный режим
    
    M117 Poop 1...                                                                ; 💬 Вывод текста о начале формирования первой капли
    G1 Z{purge_z_start} F1500                                                     ; ↕️ Опускаем сопло вплотную к PEI листу на высоту 0.3 мм
    G1 Z{purge_z_end} E{poop_len} F{purge_speed}                                  ; 🧵 Намываем ком пластика вверх с одновременным подъемом Z
    G1 Z{purge_z_end + 3.0} F3000                                                 ; 🚀 Резкий подскок оси Z вверх на 3 мм для отрыва нити
    G4 P2000                                                                      ; ⏳ Удерживаем паузу 2 секунды для доплавления остатков

    M117 Poop 2...                                                                ; 💬 Вывод текста о начале формирования второй капли
    G1 Y{y_poop2} F6000                                                           ; 🚀 Быстро переезжаем кареткой на вторую точку по Y
    G1 Z{purge_z_start} F1500                                                     ; ↕️ Снова опускаем сопло к PEI листу на высоту 0.3 мм
    G1 Z{purge_z_end} E{poop_len} F{purge_speed}                                  ; 🧵 Формируем второй плотный ком пластика объемом 90 мм
    G1 Z{purge_z_end + 3.0} F3000                                                 ; 🚀 Выполняем резкий защитный отскок оси Z вверх на 3 мм
    
    M104 S180                                                                     ; 🔥 Задаем соплу цель пассивного охлаждения до 180°C
    M106 S255                                                                     ; 🌪️ Включаем充 вентилятор обдува модели на полную мощность
    M117 Cooling to {cool_temp}C...                                               ; 💬 Вывод сообщения о начале остывания пластика
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=185                                  ; ⏳ Ждем прохождения тепловой инерции хотенда на 185°C
    M107                                                                          ; 🌪️ Гасим вентилятор обдува, чтобы не переостудить кубик
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={cool_temp - 3} MAXIMUM={cool_temp + 10} ; ⏳ Фиксируем температуру сопла в коридоре 177-190°C
  
    SET_VELOCITY_LIMIT ACCEL=15000 ACCEL_TO_DECEL=7500                            ; 🏎️ Накатываем повышенные лимиты динамики для удара ножа
    G90                                                                           ; 📐 Переключаемся в режим абсолютных координат перемещений
    G1 X{purge_x + 20.0} Y{y_poop2} F9000                                         ; 🚀 Отводим голову в боковую точку для разгона осей
    G1 Z2.5 F3000                                                                 ; ↕️ Выставляем сопло точно на высоту среза ножа 2.5 мм
    G1 X{purge_x + 15.0} F6000                                                    ; 🚀 Проходим промежуточную точку траектории разгона X
    G1 X{fling_x} F{fling_speed}                                                  ; 🎯 СВЕРХМОЩНЫЙ РЫВОК за пределы стола со скоростью 600 мм/с

    SET_VELOCITY_LIMIT ACCEL={printer.configfile.settings.printer.max_accel}       ; 🏎️ Полностью восстанавливаем исходные лимиты ускорений
    G1 Z{purge_z_end + 10.0} F3000                                                ; ↕️ Отводим ось Z вверх на безопасное расстояние от стола
    G92 E0                                                                        ; ⚙️ Принудительно обнуляем счетчик шагов экструдера
    RESTORE_GCODE_STATE NAME=fling_poop_state                                     ; 💾 Восстанавливаем изначальные координаты и режимы принтера

    # --- УМНЫЙ ФИНАЛ МАКРОСА №1 ---
    {% if called_from_start == 1 %}
        CLEANING_NOZZLE CALLED_FROM_START=1                                       ; 🪥 Если из старта — свет не трогаем, вызываем макрос щетки
    {% else %}
        M104 S0                                                                   ; 🔥 Если из консоли вручную — полностью отключаем сопло
        M106 S255                                                                 ; 🌪️ Включаем обдув модели на максимум для ускорения
        TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=180                              ; ⏳ Дожидаемся остывания хотенда ниже безопасных 180°C
        M107                                                                      ; 🌪️ Полностью выключаем вентилятор обдува модели принтера
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Финал: Возвращаем синий цвет на логотип в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🔵 Финал: Возвращаем синий цвет на левое сопло в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🔵 Финал: Возвращаем синий цвет на правое сопло и шлем
        M117 Fling Poop Done. Standby Ready.                                      ; 💬 Вывод финального текста готовности принтера в статус
    {% endif %}
# ============================================================================================================================
# 🧼 МАКРОС №2: МЕХАНИЧЕСКАЯ ОЧИСТКА СОПЛА ОБ ЩЕТКУ И КРАЙ СТОЛА (ЧАСТЬ 1)
# ============================================================================================================================

[gcode_macro CLEANING_NOZZLE]
description: 🟠 Механическая очистка сопла об щетку и край стола (Часть 1)
gcode:
    {% set called_from_start = params.CALLED_FROM_START|default(0)|int %}         ; 📌 Флаг источника вызова (0-вручную, 1-старт)
    {% set target_temp = 180 %}                                                   ; 📐 Стандартная целевая температура чистки

    # --- АВТОМАТИЧЕСКИЙ ВЫБОР СВЕТА В НАЧАЛЕ ---
    {% if printer.extruder.temperature < (target_temp - 3) %}
        SET_LED LED=hotend_rgb RED=1.0 GREEN=0.0 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔴 Нагрев: Включаем красный цвет логотипа в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Нагрев: Включаем белый свет левого сопла в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Нагрев: Включаем белый свет правого сопла и шлем
    {% else %}
        SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟠 Удержание: Оранжевый цвет логотипа в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Удержание: Белый свет левого сопла в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Удержание: Белый свет правого сопла и шлем
    {% endif %}

    # Проверка статуса осей принтера перед началом выезда головы к щетке
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                                                                       ; 🏠 Полная парковка всех осей, если координаты неизвестны
    {% elif 'z' not in printer.toolhead.homed_axes %}
        G28 Z                                                                     ; 🏠 Допарковка только оси Z, если X и Y уже известны
    {% else %}
        {% if printer.toolhead.position.z < 4.0 %}
            G90                                                                   ; 📐 Переключение в абсолютную систему координат
            G0 Z4 F600                                                            ; ↕️ Безопасно поднимаем сопло на 4 мм от стола
        {% endif %}
    {% endif %}

    M104 S{target_temp}                                                           ; 🔥 Удерживаем или догреваем Rapido 2 до 180°C
    {% if printer.extruder.temperature > 185 %}
        M106 S255                                                                 ; 🌪️ Разгоняем вентилятор обдува, если сопло перегрето
    {% endif %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={target_temp - 3} MAXIMUM={target_temp + 10} ; ⏳ Жестко ловим удержание температуры в коридоре
    M107                                                                          ; 🌪️ Железно выключаем вентилятор обдува модели

    # Нагрев стабилизировался -> Принудительно подтверждаем Оранжевый логотип и Белые сопла
    SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟠 Чистка: Оранжевый цвет логотипа в буфер обмена
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Чистка: Белый свет левого сопла в буфер обмена
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Чистка: Белый свет правого сопла и отправка буфера

    G91                                                                           ; 📐 Включаем относительные координаты перемещений осей
    G0 Z5                                                                         ; ↕️ Приподнимаем сопло вверх на 5 мм для переезда стола
    G90                                                                           ; 📐 Возвращаем абсолютные координаты перемещений осей
    G0 X-7 Y-12.5 F6000                                                           ; 🚀 Перемещаем сопло в начальную координату зоны щетки
    G0 Z0                                                                         ; ↕️ Опускаем сопло вглубь ворса щетки на высоту Z=0

    G91                                                                           ; 📐 Включаем относительную систему координат для циклов
    {% for wipe in range(3) %}
        G0 X38 F6000                                                              ; 🚀 Сдвиг головы по оси X вперед по ворсу на 38 мм
        G0 X-38 F6000                                                             ; 🚀 Сдвиг головы по оси X обратно по ворсу на 38 мм
    {% endfor %}
    G0 Y3 F6000                                                                   ; 🚀 Сдвигаем сопло по оси Y на 3 мм вглубь щетки
    {% for wipe in range(3) %}
        G0 X38 F6000                                                              ; 🚀 Сдвиг головы по оси X вперед по ворсу на 38 мм
        G0 X-38 F6000                                                             ; 🚀 Сдвиг головы по оси X обратно по ворсу на 38 мм
    {% endfor %}
    G0 Y-3 F6000                                                                  ; 🚀 Возвращаем сопло по оси Y на начальную линию ворса
    # Фигурный цикл очистки (зигзаги по ворсу для очистки боковых граней сопла)
    G0 X8.25                                                                      ; 🚀 Предварительное смещение каретки по X на 8.25 мм
    G0 Y5.5                                                                       ; 🚀 Предварительное смещение каретки по Y на 5.5 мм
    {% for zig in range(6) %}
        G0 X2.5 Y-8 F6000                                                         ; 🚀 Косая диагональ зигзага по ворсу щетки
        G0 X2.5 Y8 F6000                                                          ; 🚀 Обратная косая диагональ зигзага по ворсу щетки
    {% endfor %}
    G0 Z3                                                                         ; ↕️ Приподнимаем сопло из ворса щетки вверх на 3 мм

    # Финальная полировка сопла на щетке перед выездом каретки на печатную платформу
    G90                                                                           ; 📐 Возвращаем абсолютные координаты перемещений осей
    G0 X-7 Y-12.5 F6000                                                           ; 🚀 Возвращаем голову на начальную точку щетки
    G0 Z1.5                                                                       ; ↕️ Выставляем высоту сопла Z=1.5 мм над ворсом
    G91                                                                           ; 📐 Включаем относительные координаты перемещений осей
    G0 Y-1.5 F6000                                                                ; 🚀 Короткий финишный доворот каретки по оси Y
    {% for wipe in range(3) %}
        G0 X38 F6000                                                              ; 🚀 Быстрый заглаживающий проход по X на 38 мм вперед
        G0 X-38 F6000                                                             ; 🚀 Быстрый заглаживающий проход по X на 38 мм обратно
    {% endfor %}

    # --- ПРИЖАТИЕ И ПРИТИРКА СОПЛА ОБ МЕТАЛЛИЧЕСКИЙ КРАЙ СТОЛА ---
    G90                                                                           ; 📐 Возвращаем абсолютные координаты перемещений осей
    G1 Z5 F3000                                                                   ; ↕️ Безопасно поднимаем сопло по оси Z на высоту 5 мм
    G1 X150 Y-5 F9000                                                             ; 🚀 Быстро вывозим сопло на металлическую планку края стола
    G1 Z0 F1500                                                                   ; ↕️ Опускаем сопло вплотную до физического касания металла стола
    {% for edge_wipe in range(3) %}
        G1 X155 F3000                                                             ; 🚀 Сдвиг сопла вправо по кромке стола до координаты X155
        G1 X150 F3000                                                             ; 🚀 Сдвиг сопла влево по кромке стола до координаты X150
    {% endfor %}

    # --- УМНЫЙ ФИНАЛ МАКРОСА №2 ---
    {% if called_from_start == 1 %}
        M104 S180                                                                 ; 🔥 Если из старта — сопло держим на 180°C для датчика Z
        M117 Cleaned (Keep 180C)                                                  ; 💬 Вывод сообщения о продолжении стартовой подготовки
    {% else %}
        M104 S0                                                                   ; 🔥 Если из консоли вручную — полностью отключаем сопло
        M106 S255                                                                 ; 🌪️ Включаем обдув модели на максимум для ускорения
        TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=180                              ; ⏳ Дожидаемся остывания хотенда ниже безопасных 180°C
        M107                                                                      ; 🌪️ Полностью выключаем вентилятор обдува модели принтера
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Финал: Возвращаем синий цвет на логотип в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🔵 Финал: Возвращаем синий цвет на левое сопло в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🔵 Финал: Возвращаем синий цвет на правое сопло и шлем
        M117 Cleaned (Heater Off)                                                 ; 💬 Вывод финального текста об успешном завершении чистки
    {% endif %}
