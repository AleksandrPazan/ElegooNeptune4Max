# ============================================================================================================================
# НАСТРОЙКА КАРТЫ ВЫСОТ СТОЛА (BED MESH) ДЛЯ ДАТЧИКА BTT EDDY
# ============================================================================================================================
[bed_mesh]
zero_reference_position: 210, 210                                # 🎯 Индексная точка отсчета (базовый ноль в центре стола)
speed: 200                                                       # 🏎️ Скорость перемещения между точками сканирования (мм/с)
horizontal_move_z: 2                                             # 🛫 Высота подъема оси Z при переездах между точками (мм)
mesh_min: 15, 15                                                 # 📉 Минимальная координата сканирования по датчику (X, Y)
mesh_max: 405, 405                                               # 📈 Максимальная координата сканирования по датчику (X, Y)
probe_count: 100, 100                                            # 🔍 Плотность сетки (10 000 точек для ультра-быстрого сканирования)
adaptive_margin: 10                                              # 📏 Отступ адаптивной сетки вокруг зоны печати детали (мм)
mesh_pps: 0, 0                                                   # 🧼 Отключение искусственной интерполяции (сетка и так плотная)
algorithm: bicubic                                               # 🧮 Алгоритм интерполяции карты стола
bicubic_tension: 0.2                                             # 📐 Коэффициент натяжения сплайна интерполяции
scan_overshoot: 8                                                # 🔄 Вылет за границы сетки (мм) для плавного разгона/торможения
# ============================================================================================================================
# НАСТРОЙКА ИНДУКЦИОННОГО ДАТЧИКА BTT EDDY (КАТУШКА + КАСАНИЕ СОПЛОМ)
# ============================================================================================================================
[probe_eddy_current my_eddy_probe]
sensor_type: ldc1612                                             # ⚙️ Тип используемого сенсорного чипа вихревых токов
frequency: 12000000                                              # ⚡ Внешняя тактовая частота микросхемы LDC1612 (Гц)
i2c_mcu: eddy                                                    # 🔌 Имя платы контроллера датчика Eddy в системе
i2c_bus: i2c0f                                                   # 🚌 Используемая шина I2C для связи с чипом
x_offset: 0                                                      # 📐 Смещение датчика относительно сопла по оси X (мм)
y_offset: 21.42                                                  # 📐 Смещение датчика относительно сопла по оси Y (мм)
speed: 1                                                         # 🏎️ Скорость движения оси Z при поиске стола (мм/с)
samples: 4                                                       # 🔢 Количество повторных замеров в одной точке стола
sample_retract_dist: 2                                           # 🛫 Высота подъема оси Z между повторными замерами (мм)
samples_result: median                                           # 🧮 Метод вычисления результата замеров (медиана)
samples_tolerance: 0.025                                         # ✅ Максимально допустимый разброс между замерами (мм)
samples_tolerance_retries: 5                                     # 🔄 Количество попыток перемерить точку при превышении допуска
descend_z: 1                                                     # 🛬 Номинальное расстояние между соплом и столом (мм)
tap_z_offset: 0.0                                                # 🎯 Смещение высоты сопла при физическом контакте (мм)
#tap_threshold:                                                  # 🤫 Закомментировано: порог шума подбирается автоматически
# ============================================================================================================================
# ДАТЧИК ТЕМПЕРАТУРЫ ПРОЦЕССОРА ПЛАТЫ BTT EDDY
# ============================================================================================================================
[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu                                     # 🌡️ Встроенный в микроконтроллер датчик температуры
sensor_mcu: eddy                                                 # 🔌 Опрос датчика с платы контроллера Eddy
min_temp: 10                                                     # ❄️ Минимальная рабочая температура датчика (°C)
max_temp: 100                                                    # 🔥 Максимальная аварийная температура датчика (°C)
# ============================================================================================================================
# ДАТЧИК ТЕМПЕРАТУРЫ КОРПУСА/КАТУШКИ BTT EDDY (ТЕРМИСТОР)
# ============================================================================================================================
[temperature_sensor btt_eddy]
sensor_type: Generic 3950                                        # 📈 Стандартный тип термистора компенсации дрейфа катушки
sensor_pin: eddy:gpio26                                          # 📌 Ножка подключения термистора на плате Eddy =
# ============================================================================================================================









   