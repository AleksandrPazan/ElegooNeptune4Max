# ============================================================================================================================
# ⚙️ ГРУППА: ОСНОВНЫЕ УПРАВЛЯЮЩИЕ МАКРОСЫ СЦЕНАРИЕВ ПЕЧАТИ
# ============================================================================================================================

[gcode_macro PRINT_START]
description: 🖨️ Стартовый макрос подготовки принтера к печати с двойной проверкой филамента
gcode:
    {% set target_bed = params.BED|default(60)|int %}                             ; 🌡️ Температура нагрева стола из печатного файла слайсера
    {% set target_extruder = params.EXTRUDER|default(210)|int %}                   ; 🌡️ Температура нагрева сопла из печатного файла слайсера

    # --- ЭТАП 1: Фоновый старт нагрева стола ---
    SET_PIN PIN=POWER_LED VALUE=1                                                 ; 🌟 Система: Включаем подсветку корпуса
    M140 S{target_bed}                                                            ; 🧠 Нагрев: Старт нагрева стола без блокировки очереди
    SET_GCODE_OFFSET Z=0                                                          ; ⚙️ Система: Сброс старого Z-offset
    BED_MESH_CLEAR                                                                ; 💾 Память: Очистка старой сетки стола

    # --- 🟪⚪ ЭТАП 2: Безопасная парковка (Логотип Фиолетовый, Сопла Белые) ---
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟣 Статус: Фиолетовый цвет на логотип в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Статус: Чистый белый свет на левом сопле в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Статус: Чистый белый свет на правом сопле и отправка буфера

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                                                                       ; 🏠 Механика: Полный хоминг, если не припаркован
    {% elif 'z' not in printer.toolhead.homed_axes %}
        G28 Z                                                                     ; 🏠 Механика: Допарковка только Z осей
    {% else %}
        {% if printer.toolhead.position.z < 4.0 %}
            G90                                                                   ; 📐 Режим абсолютных координат осей
            G0 Z4 F600                                                            ; ↕️ Защитный подъем сопла на 4 мм
        {% endif %}
    {% endif %}
    M400                                                                          ; ⏳ Система: Ожидание окончания движений

    # --- 🟠 ЭТАП 3: Очистка филамента на холодную (Логотип Оранжевый, Сопла на контроле автоматики) ---
    SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=1 ; 🟠 Статус: Оранжевый цвет на логотипе

    FLING_POOP_DUO CALLED_FROM_START=1                                            ; 🪥 Очистка: Отстрел двух капель в ведро

     # --- 🛑 ЭТАП 5: Финальный прогрев Rapido 2 (Логотип Красный, Сопла Белые) ---
    SET_LED LED=hotend_rgb RED=1.0 GREEN=0.0 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔴 Нагрев: Включаем красный цвет логотипа в буфер обмена
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Нагрев: Включаем чистый белый свет левого сопла в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Нагрев: Включаем чистый белый свет правого сопла и шлем буфер

    G1 X150 Y-5 F9000                                                             ; 🚀 Механика: Выезд сопла на safe срез металлической планки стола
    G1 Z0.0 F1500                                                                 ; ↕️ Механика: Опускание сопла вплотную к уровню PEI листа стола
    M190 S{target_bed}                                                            ; ⏳ Нагрев: Точное блокирующее ожидание финального нагрева стола
    G1 Z5.0 F3000                                                                 ; ↕️ Механика: Защитный отскок сопла вверх на высоту 5 мм перед тестом
    
     # --- 🟪⚪ ЭТАП 4: Измерение геометрии стола (Логотип Фиолетовый, Сопла Белые) ---
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟣 Статус: Включаем фиолетовый цвет на логотипе в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Статус: Чистый белый свет на левом сопле в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Статус: Чистый белый свет на правом сопле и шлем буфер
    
    SET_Z_FROM_PROBE CALLED_FROM_START=1                                          ; 🎯 Система: Запуск макроса №3 замера Z по датчику Tap (свет переключится)
    BED_MESH_CALIBRATE ADAPTIVE=1 METHOD=rapid_scan                               ; 🎯 Геометрия: Скоростное адаптивное сканирование стола датчиком Eddy
    M400                                                                          ; ⏳ Система: Жесткое ожидание окончания всех расчетов Klipper в памяти

    # --- 🛑 ЭТАП 5: Финальный прогрев Rapido 2 (Логотип Красный, Сопла Белые) ---
    SET_LED LED=hotend_rgb RED=1.0 GREEN=0.0 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔴 Нагрев: Включаем красный цвет логотипа в буфер обмена
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Нагрев: Включаем чистый белый свет левого сопла в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Нагрев: Включаем чистый белый свет правого сопла и шлем буфер

    G1 X150 Y-5 F9000                                                             ; 🚀 Механика: Повторная парковка сопла на срез металлической планки стола
    G1 Z0.0 F1500                                                                 ; ↕️ Механика: Опускание сопла вплотную к краю стола для притирки сопли
    M104 S{target_extruder}                                                       ; 🔥 Нагрев: Подаем силовую команду на нагрев Rapido 2 до температуры слайсера
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={target_extruder - 3} MAXIMUM={target_extruder + 10} ; ⏳ Жесткое блокирующее ожидание коридора тепла сопла
    G1 X155 F3000                                                                 ; 🚀 Механика: Финишная сглаживающая притирка капли по оси X об металл стола
    G92 E0                                                                        ; ⚙️ Система: Принудительно сбрасываем счетчик пройденных шагов экструдера
    G90                                                                           ; 📐 Система: Подтверждаем режим абсолютных координат осей принтера

    # --- 🖨️ ЭТАП 6: Старт печати модели (Логотип Синий, Сопла Белые) ---
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Печать: Включаем синий цвет логотипа в буфер обмена
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Печать: Включаем чистый белый свет левого сопла в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Печать: Включаем чистый белый свет правого сопла и шлем буфер
    
    G1 Z5.0 F1200                                                                 ; ↕️ Механика: Безопасный подъем оси Z на 5 мм и прыжок на код модели слайсера

# ============================================================================================================================
# ⚙️ ГРУППА: ОСНОВНЫЕ УПРАВЛЯЮЩИЕ МАКРОСЫ СЦЕНАРИЕВ ПЕЧАТИ
# ============================================================================================================================

[gcode_macro PRINT_END]
description: 🟢 Успешное завершение печати (безопасный ретракт 4 мм, обдув до 150°C, раздельная индикация остывания)
gcode:
    {% set max_z = printer.toolhead.axis_maximum.z | float %}                     ; ↕️ Система: Считываем конструктивный максимум оси Z принтера
    {% set current_z = printer.toolhead.position.z | float %}                     ; ↕️ Система: Считываем текущую высоту положения сопла по Z
    {% set max_x = printer.toolhead.axis_maximum.x | float %}                     ; 🧭 Система: Считываем максимальный габарит стола по оси X
    {% set current_x = printer.toolhead.position.x | float %}                     ; 🧭 Система: Считываем текущую координату каретки по оси X
    
    {% if current_z < (max_z - 10.0) %}
        {% set z_lift = 10.0 %}                                                   ; ↕️ Расчет: Если запас высоты позволяет, поднимаем ось Z на 10 мм
    {% else %}
        {% set z_lift = max_z - current_z %}                                      ; ↕️ Расчет: Если голова под потолком, поднимаем на остаток лимита
    {% endif %}

    {% if current_x + 5.0 < max_x %}
        {% set wipe_x = 5.0 %}                                                    ; 🧭 Расчет: Сдвигаем голову на 5 мм вправо для отрыва нити пластика
    {% else %}
        {% set wipe_x = -5.0 %}                                                   ; 🧭 Расчет: Если голова в упоре справа, сдвигаем на 5 мм влево
    {% endif %}

    # --- 🌐⚪ ЭТАП 1: Охлаждение сопла кулером (Логотип Голубой, Сопла Чистые Белые) ---
    # Исправлено: переключили сопла со смешения RGB на чистый белый кристалл WHITE=1.0
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.5 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🌐 Остывание: Окрашиваем логотип в голубой цвет в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Остывание: Включаем чистый белый свет левого сопла в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Остывание: Включаем чистый белый свет правого сопла и шлем

    M400                                                                          ; ⏳ Система: Ждем завершения всех крайних движений печати детали
    G90                                                                           ; 📐 Система: Переходим в режим абсолютных координат перемещений
    M83                                                                           ; ⚙️ Экструдер: Включаем относительный счетчик перемещения прутка
    
    G1 E-1.5 F3600                                                                ; 🧵 Экструдер: Этап 1 - Скоростной откат 1.5 мм для разрыва давления
    G91                                                                           ; 📐 Система: Включаем временную относительную систему координат
    G1 X{wipe_x} Z{z_lift} F3000                                                  ; 🚀 Механика: Сдвиг головы в бок с одновременным подъемом оси Z вверх
    G1 E-2.5 F1200                                                                ; 🧵 Экструдер: Этап 2 - Медленный вывод 2.5 мм прутка в зону радиатора
    
    G90                                                                           ; 📐 Система: Возвращаем режим абсолютных координат перемещений
    G1 X0 Y410 F9000                                                              ; 🚀 Механика: Паркуем огромный стол вперед, убирая голову назад в угол
    M400                                                                          ; ⏳ Система: Дожидаемся окончания парковочного движения механики
    
    M104 S0                                                                       ; 🔥 Нагрев: Намертво отключаем нагревательный картридж Rapido 2
    M140 S0                                                                       ; 🔥 Нагрев: Намертво отключаем силовой обогрев стола 420х420 мм
    M106 S255                                                                     ; 🌪️ Вентилятор: Разгоняем обдув модели на полную мощность для остывания
    M117 Cooling to 150C...                                                       ; 💬 Текст: Вывод текстового сообщения о начале остывания хотенда
    
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=150                                  ; ⏳ Система: Блокируем макрос до падения температуры сопла ниже 150°C
    M107                                                                          ; 🌪️ Вентилятор: Полностью выключаем вентилятор обдува модели
    M84                                                                           ; 🔒 Электрика: Снимаем питание и полностью гасим все шаговые двигатели

    # --- 🔵 ЭТАП 2: Успешный финал (Вся голова горит вашим фирменным Синим) ---
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Финал: Окрашиваем логотип в синий цвет простоя в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🔵 Финал: Окрашиваем левое сопло в синий цвет простоя в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🔵 Финал: Окрашиваем правое сопло в синий цвет и отправляем буфер
    M117 Print Finished!                                                          ; 💬 Текст: Вывод финального сообщения об успешном окончании работы

[gcode_macro CANCEL_PRINT]
description: ❌ Полная отмена печати с пульта (безопасный ретракт 4 мм, обдув до 150°C, раздельная индикация)
rename_existing: BASE_CANCEL_PRINT
gcode:
    {% set max_z = printer.toolhead.axis_maximum.z | float %}                     ; ↕️ Система: Считываем габаритный максимум оси Z вашего принтера
    {% set current_z = printer.toolhead.position.z | float %}                     ; ↕️ Система: Считываем текущую высоту координаты сопла над столом
    {% set max_x = printer.toolhead.axis_maximum.x | float %}                     ; 🧭 Система: Считываем максимальную длину хода каретки по оси X
    {% set current_x = printer.toolhead.position.x | float %}                     ; 🧭 Система: Считываем текущую координату положения головы по X
    
    {% if current_z < (max_z - 10.0) %}
        {% set z_lift = 10.0 %}                                                   ; ↕️ Расчет: Безопасно поднимаем сопло на 10 мм вверх от детали
    {% else %}
        {% set z_lift = max_z - current_z %}                                      ; ↕️ Расчет: Подъем на остаток высоты до физического лимита рамы
    {% endif %}

    {% if current_x + 5.0 < max_x %}
        {% set wipe_x = 5.0 %}                                                    ; 🧭 Расчет: Смещаем сопло вправо на 5 мм для отрыва пластика
    {% else %}
        {% set wipe_x = -5.0 %}                                                   ; 🧭 Расчет: Смещаем сопло влево на 5 мм, если каретка в упоре
    {% endif %}

    # --- 🌐⚪ ЭТАП 1: Экстренное охлаждение (Логотип Голубой, Сопла Чистые Белые) ---
    # Исправлено: переключили сопла со смешения RGB на чистый белый кристалл WHITE=1.0
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.5 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🌐 Остывание: Переводим логотип в голубой режим в буфер обмена
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Остывание: Включаем чистый белый свет левого сопла в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Остывание: Включаем чистый белый свет правого сопла и шлем

    CLEAR_PAUSE                                                                   ; 💾 Память: Полная очистка буфера состояний режима паузы принтера
    M400                                                                          ; ⏳ Система: Ждем остановки всех физических перемещений механики
    G90                                                                           ; 📐 Система: Переходим в режим абсолютных координат перемещений
    M83                                                                           ; ⚙️ Экструдер: Переводим экструдер в относительный режим счета шагов
    
    {% if printer.extruder.can_extrude|lower == 'true' %}
        G1 E-1.5 F3600                                                            ; 🧵 Экструдер: Быстрый защитный откат пластика назад на 1.5 мм
    {% endif %}

    G91                                                                           ; 📐 Система: Включаем временные относительные координаты движения
    G1 X{wipe_x} Z{z_lift} F3000                                                  ; 🚀 Механика: Сдвиг головы по X с одновременным уходом оси Z вверх
    
    {% if printer.extruder.can_extrude|lower == 'true' %}
        G1 E-2.5 F1200                                                            ; 🧵 Экструдер: Дополнительный медленный откат прутка на 2.5 мм (всего 4 мм)
    {% endif %}
    
    G90                                                                           ; 📐 Система: Возвращаем режим абсолютных координат перемещений
    G1 X0 Y410 F9000                                                              ; 🚀 Механика: Отводим тяжелый стол вперед, уводя голову в дальний угол
    M400                                                                          ; ⏳ Система: Ждем полного завершения парковочного сдвига осей
    
    M104 S0                                                                       ; 🔥 Нагрев: Выключаем нагревательный картридж сопла в 0°C
    M140 S0                                                                       ; 🔥 Нагрев: Выключаем нагревательный элемент стола в 0°C
    M106 S255                                                                     ; 🌪️ Вентилятор: Врубаем вентилятор обдува модели на 100% мощности
    M117 Cancelled! Cooling nozzle...                                             ; 💬 Текст: Вывод сообщения о начале аварийного охлаждения
    
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=150                                  ; ⏳ Система: Ждем падения температуры датчика Rapido 2 ниже 150°C
    M107                                                                          ; 🌪️ Вентилятор: Полностью выключаем вентилятор обдува модели
    M84                                                                           ; 🔒 Электрика: Отключаем удержание и полностью обесточиваем моторы
    SET_IDLE_TIMEOUT TIMEOUT=1800                                                 ; ⏳ Система: Задаем время простоя принтера до отключения (30 минут)

    # --- 🔵 ЭТАП 2: Возврат в простой (Вся голова горит вашим фирменным Синим) ---
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Финал: Окрашиваем логотип в синий цвет простоя в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🔵 Финал: Окрашиваем левое сопло в синий цвет простоя в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🔵 Финал: Окрашиваем правое сопло в синий цвет и отправляем буфер
    
    M117 Print Cancelled!                                                         ; 💬 Текст: Вывод финального сообщения об успешной отмене печати
    BASE_CANCEL_PRINT                                                             ; 🚀 Система: Системный вызов базовой процедуры отмены Klipper
[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True