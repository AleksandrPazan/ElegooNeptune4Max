# ============================================================================================================================
# 🧵 ГРУППА: АВТОМАТИЗАЦИЯ КОНТРОЛЯ ФИЛАМЕНТА, АВАРИЙНЫХ ПАУЗ И ПЕРЕЗАПРАВКИ ПРУТКА
# ============================================================================================================================


[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
variable_saved_extruder_temp: 0                                                   ; Переменная фиксации рабочей температуры сопла
variable_pause_start_time: 0                                                      ; Переменная фиксации времени начала паузы
variable_was_lifted_to_50: 0                                                      ; Флаг принудительного подъема оси Z на 50 мм
gcode:
    SAVE_GCODE_STATE NAME=PAUSE_state                                             ; Точный мгновенный снимок координат на детали

    {% set x_park = 430.0 %}                                                       ; Координата X угла парковки Stealthburner
    {% set z_lift = 2.0 %}                                                        ; Отскок Z вверх от детали при паузе (в мм)
    {% set z_min_safe = 50.0 %}                                                   ; Минимально безопасная рабочая высота Z
    {% set retract = 2.0 %}                                                       ; Длина мгновенного защитного ретракта прутка
    
    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=saved_extruder_temp VALUE={printer.extruder.target|float} ; Запись цели хотенда в память
    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=pause_start_time VALUE={printer.toolhead.estimated_print_time|float} ; Фиксация времени паузы
    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=was_lifted_to_50 VALUE=0              ; Сброс флага высокого защитного подъема Z
    
    {% set max_z = printer.toolhead.axis_maximum.z|float %}                       ; Максимум высоты оси Z принтера из конфига
    {% set act_z = printer.toolhead.position.z|float %}                           ; Текущая координата сопла над столом по Z
    {% if act_z < (max_z - z_lift) %}
        {% set z_safe = z_lift %}                                                 ; Расчет безопасной высоты подъема Z на +2 мм
    {% else %}
        {% set z_safe = max_z - act_z %}                                          ; Предел высоты подъема, если голова под потолком
    {% endif %}
    
    BASE_PAUSE                                                                    ; Вызов встроенной процедуры паузы Klipper
    G91                                                                           ; Относительная система координат перемещений
    {% if printer.extruder.can_extrude|lower == 'true' %}
        G1 E-{retract} F2100                                                      ; Скоростной защитный откат пластика на 2 мм
    {% endif %}
    G1 Z{z_safe} F900                                                             ; Первичный подъем сопла Z вверх от детали
    
    G90                                                                           ; Возврат в режим абсолютных координат перемещений
    G1 X{x_park} F6000                                                            ; Увод инструментальной головки в дальний правый угол
    {% if (act_z + z_safe) < z_min_safe %}
        G1 Z{z_min_safe} F900                                                     ; Если ниже 50 мм, поднимаем сопло до 50 мм
        SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=was_lifted_to_50 VALUE=1          ; Включение флага принудительного подъема Z
    {% endif %}
   

[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_saved_extruder_temp: 0                                                   ; Переменная восстановления рабочего тепла сопла
variable_sensor_triggered: 0                                                      ; Флаг источника паузы (0-вручную, 1-по датчику)
gcode:
    {% set restore_accel = printer.toolhead.max_accel %}                          ; Считываем настройки ускорения принтера
    {% set z_lift = 2.0 %}                                                        ; Защитный зазор над деталью перед возвратом
    {% set target_z = printer.gcode_move.gcode_position.z|float %}               ; Считываем координату слоя детали до паузы
    {% set z_first_lift_height = target_z + z_lift %}                             ; Высота возврата головы (слой детали + 2 мм)
    
    SET_VELOCITY_LIMIT ACCEL=5000 MINIMUM_CRUISE_RATIO=0.0                         ; Плавные стартовые ускорения для возврата каретки
    G90                                                                           ; Режим абсолютных координат перемещений осей
    M83                                                                           ; Экструдер в относительный режим счета шагов
    
    # Проверка источника: если сработало по датчику, пруток прокачан кнопками диалога
    {% if printer["gcode_macro RESUME"].sensor_triggered|int == 0 %}
        G1 E100.0 F500                                                            ; Ручной возврат: продавливаем стандартные 100 мм прутка
        M400                                                                      ; Ожидаем полной остановки шестерен экструдера
    {% endif %}
    
    G1 E-2.0 F2100                                                                ; Скоростной защитный ретракт 2 мм перед выездом
    M400                                                                          ; Ожидание окончания ретракта в памяти принтера
    
    # Шаг 1: Если каретка была поднята до 50 мм, плавно опускаем её к детали
    {% if printer["gcode_macro PAUSE"].was_lifted_to_50|int == 1 %}
        G1 Z{z_first_lift_height} F1200                                           ; Опускаем ось Z до слоя детали с зазором 2 мм
        M400                                                                      ; Ожидание полной остановки двигателей Z
    {% endif %}
    
    # Шаг 2: Встряхивание сопла быстрыми проходами по X в углу для сбития сопли
    G1 X390 F30000                                                                ; Скоростной проход каретки влево до X390 (500 мм/с)
    G1 X430 F30000                                                                ; Скоростной проход каретки обратно в угол X430
    G1 X390 F30000                                                                ; Повторный скоростной проход для очистки кончика
    G1 X430 F30000                                                                ; Повторный скоростной проход обратно в угол
    G1 X390 F30000                                                                ; Третий финишный заглаживающий проход по X
    G1 X430 F30000                                                                ; Третий финишный возврат в координату угла
    M400                                                                          ; Ожидание полной остановки каретки Stealthburner
    
    # Шаг 3: Точный скоростной возврат X и Y прямо над точкой паузы модели
    {% set target_x = printer.gcode_move.gcode_position.x|float %}               ; Считываем координату X точки останова на детали
    {% set target_y = printer.gcode_move.gcode_position.y|float %}               ; Считываем координату Y точки останова на детали
    G1 X{target_x} Y{target_y} F27000                                             ; Сверхбыстро привозим сопло в координату паузы (450 мм/с)
    M400                                                                          ; Дожидаемся полной остановки каретки в точке
    
    # Шаг 4: Восстановление исходной высоты Z, ретракта и продолжение печати
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1 SPEED=20                         ; Возвращаем ось Z точно на слой модели (20 мм/с)
    M400                                                                          ; Ожидание касания слоя осей механики
    G1 E2.0 F2100                                                                 ; Возвращаем защитный ретракт 2 мм вперед в сопло
    M400                                                                          ; Ожидание восстановления давления в Rapido 2
    
    SET_VELOCITY_LIMIT ACCEL={restore_accel}                                      ; Восстанавливаем исходные лимиты ускорений слайсера
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=sensor_triggered VALUE=0            ; Обнуляем флаг срабатывания датчика филамента
    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=was_lifted_to_50 VALUE=0              ; Обнуляем флаг высокого сервисного подъема оси Z
    BASE_RESUME                                                                   ; Системный вызов Klipper для продолжения печати модели


# ============================================================================================================================
# 🧵 МОНОЛИТНАЯ ГРУППА: АВТОМАТИЗАЦИЯ КОНТРОЛЯ ФИЛАМЕНТА, АВАРИЙНЫХ ПАУЗ И КНОПОК ИНТЕРФЕЙСА (ЧАСТЬ 1)
# ============================================================================================================================

[gcode_macro _FS_MEMORY]
variable_backup_temp: 0.0                                                         ; 💾 Сейф-контейнер для хранения температуры слайсера
gcode:
    M117 FS Memory Active                                                         ; 💬 Системный маркер работы памяти в статусную строку


[filament_switch_sensor filament_sensor]
pause_on_runout: True                                                             ; 🛡️ БЕЗОПАСНОСТЬ: Klipper сам ставит печать на паузу и уводит голову в X430
switch_pin: ^EBBCan:gpio22                                                         ; 🧭 Пин подключения концевика датчика филамента
debounce_delay: 0.5                                                               ; 🏎️ Задержка 0.5 сек для фильтрации ложных срабатываний и дребезга
runout_gcode:
    SET_GCODE_VARIABLE MACRO=_FS_MEMORY VARIABLE=backup_temp VALUE={printer.extruder.target|float} ; 💾 Запоминаем рабочую температуру модели из слайсера

    # --- 🟪⚪ ПОДСВЕТКА: Аварийная Пауза (Логотип Фиолетовый, Сопла Белые) ---
    SET_LED LED=hotend_rgb RED=0.7 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟣 Фиолетовый цвет на логотип в буфер обмена
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Рабочий белый свет на левое сопло в буфер обмена
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Рабочий белый свет на правое сопло и отправка буфера

    # Формирование Окна 1: Интерактивное глухое охлаждение хотенда под вентилятором обдува
    RESPOND TYPE=command MSG="action:prompt_begin !Автоматическая загрузка!"       ; 🖥️ Открытие всплывающего окна Moonraker на экране
    RESPOND TYPE=command MSG="action:prompt_text Подготовка к загрузке филамента..." ; 💬 Текст инструкции внутри окна диалога
    RESPOND TYPE=command MSG="action:prompt_footer_button Отмена|_FS_CANCEL_PRINT" ; 🕹️ Кнопка экстренной отмены печати модели в подвале окна
    RESPOND TYPE=command MSG="action:prompt_show"                                  ; 🖥️ Вывод сформированного окна на экран KlipperScreen
    
    M83                                                                           ; ⚙️ Относительные координаты для шагового мотора экструдера
    G1 E30 F500                                                                   ; 🧵 Продавливаем остаток хвоста на 30 мм вперед в ведро парковки
    
    M104 S150                                                                     ; 🔥 Ставим безопасную цель парковки сопла на удержание 150°C
    M106 S255                                                                     ; 🌪️ Разгоняем вентилятор обдува модели на 100% мощности
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=155                                  ; ⏳ Ждем прохождения порога тепловой инерции хотенда
    M107                                                                          ; 🌪️ Заблаговременно выключаем кулер обдува модели детали
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=150                                  ; ⏳ Дожидаемся точной посадки тепла сопла на 150°C
    M104 S150                                                                     ; 🔥 Жестко фиксируем удержание безопасной температуры сопла
    
    # Формирование Окна 2: Ожидание физического заталкивания нового прутка в шестерни экструдера
    RESPOND TYPE=command MSG="action:prompt_end"                                  ; 🖥️ Принудительно закрываем окно охлаждения хотенда
    RESPOND TYPE=command MSG="action:prompt_begin !Автоматическая загрузка!"       ; 🖥️ Открываем новое окно заправки пластика
    RESPOND TYPE=command MSG="action:prompt_text Принтер готов. Вставьте новый пруток в экструдер." ; 💬 Текст инструкции для пользователя
    RESPOND TYPE=command MSG="action:prompt_footer_button Отмена|_FS_CANCEL_PRINT" ; 🕹️ Кнопка аварийного сброса задачи печати в подвале
    RESPOND TYPE=command MSG="action:prompt_show"                                  ; 🖥️ Выводим готовое окно ожидания прутка на экран


insert_gcode:
    {% if printer.print_stats.state|lower in ['printing', 'paused'] %}
        
        # ==================== СЦЕНАРИЙ А: ЗАПРАВКА В ПРОЦЕССЕ ПЕЧАТИ ====================
        # --- 🔴⚪ ПОДСВЕТКА НАЧАЛА НАГРЕВА: (Логотип Красный, Сопла Белые) ---
        SET_LED LED=hotend_rgb RED=1.0 GREEN=0.0 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔴 Нагрев: Включаем красный цвет логотипа в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Нагрев: Включаем белый свет левого сопла в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Нагрев: Включаем белый свет правого сопла и шлем

        RESPOND TYPE=command MSG="action:prompt_end"                               ; 🖥️ Сброс старого окна ожидания нового филамента
        RESPOND TYPE=command MSG="action:prompt_begin !Автоматическая загрузка!"   ; 🖥️ Открытие окна индикации прогрева экструдера
        RESPOND TYPE=command MSG="action:prompt_text Идет нагрев сопла до рабочей температуры модели..." ; 💬 Текст инструкции на экран
        RESPOND TYPE=command MSG="action:prompt_footer_button Отмена|_FS_CANCEL_PRINT" ; 🕹️ Кнопка отмены печати в окне диалога
        RESPOND TYPE=command MSG="action:prompt_show"                              ; 🖥️ Вывод сформированного окна на KlipperScreen
        {% set target_extruder = printer["gcode_macro _FS_MEMORY"].backup_temp|float %} ; 💾 Считываем сохраненную рабочую температуру модели
        {% if target_extruder < 170 %}
            {% set target_extruder = 255.0 %}                                     ; 🛡️ Подстраховка от нуля в памяти конфигурации
        {% endif %}

        M104 S{target_extruder}                                                   ; 🔥 Включаем силовой нагрев Rapido 2 на цель слайсера
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM=180                               ; ⏳ Ждем прохождения порога размягчения пластика (180°C)
        G1 E3 F50                                                                 ; 🧵 Ленивый аккуратный зацеп прутка шестеренками экструдера
        
        M104 S{target_extruder}                                                   ; 🔥 Повторно подтверждаем рабочую температуру хотенда
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={target_extruder - 3} MAXIMUM={target_extruder + 10} ; ⏳ Жестко ловим стабилизацию тепла сопла
        
        # --- 🟠⚪ ПОДСВЕТКА ПОСЛЕ НАГРЕВА: Сопло нагрелось -> Переходим в Оранжевый логотип, Сопла Белые ---
        SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟠 Удержание: Оранжевый цвет логотипа в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Удержание: Включаем белый свет левого сопла в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Удержание: Включаем белый свет правого сопла и шлем
        
        G1 E50 F500                                                               ; 🧵 Продавливаем основные 50 мм прутка для смены цвета
        
        RESPOND TYPE=command MSG="action:prompt_end"                               ; 🖥️ Закрываем окно прогрева экструдера головы
        RESPOND TYPE=command MSG="action:prompt_begin !Автоматическая загрузка!"   ; 🖥️ Окно финальной очистки перед возобновлением печати
        RESPOND TYPE=command MSG="action:prompt_text Финальная подготовка филамента. Очистите сопло от выдавленного пластика." ; 💬 Текст
        RESPOND TYPE=command MSG="action:prompt_footer_button Еще выдавить пластик?|_FS_PURGE_MORE" ; 🕹️ Добавочная ручная прокачка нити
        RESPOND TYPE=command MSG="action:prompt_footer_button Завершить|_FS_RESUME_PRINT" ; 🕹️ Возврат каретки на модель детали (Вариант Б)
        RESPOND TYPE=command MSG="action:prompt_footer_button Отмена|_FS_CANCEL_PRINT" ; 🕹️ Экстренный сброс текущей задачи печати
        RESPOND TYPE=command MSG="action:prompt_show"                              ; 🖥️ Показываем окно управления на экране KlipperScreen
    {% else %}
        
        # ==================== СЦЕНАРИЙ Б: ЗАПРАВКА В РЕЖИМЕ ОЖИДАНИЯ / STANDBY ====================
        RESPOND TYPE=command MSG="action:prompt_end"                               ; 🖥️ Сбрасываем старые окна Moonraker из буфера экрана
        RESPOND TYPE=command MSG="action:prompt_begin !Автоматическая загрузка!"   ; 🖥️ Открываем окно заправки прутка в режиме простоя
        RESPOND TYPE=command MSG="action:prompt_text Обнаружен пластик в простое. Проверяем состояние осей..." ; 💬 Текст на экран
        RESPOND TYPE=command MSG="action:prompt_footer_button Отмена|_FS_STANDBY_CANCEL" ; 🕹️ Кнопка отмены в подвале окна диалога
        RESPOND TYPE=command MSG="action:prompt_show"                              ; 🖥️ Выводим готовое окно на KlipperScreen
        
        {% if "xyz" in printer.toolhead.homed_axes %}
            G90                                                                   ; 📐 Переключение в режим абсолютных координат перемещений
            {% if printer.toolhead.position.z < 50.0 %}
                G1 Z50.0 F900                                                     ; ↕️ Поднимаем Z на 50 мм для удобства ручной чистки сопла
            {% endif %}
            M400                                                                  ; ⏳ Ожидание окончания физического движения осей принтера
        {% else %}
            M117 Axes are not homed. Skipping movement, melting in place.          ; 💬 Текст в консоль, если оси без хоминга домашней точки
        {% endif %}
        
        # --- 🔴⚪ ПОДСВЕТКА НАЧАЛА НАГРЕВА: (Логотип Красный, Сопла Белые) ---
        SET_LED LED=hotend_rgb RED=1.0 GREEN=0.0 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔴 Нагрев в простое: Логотип в Красный в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Нагрев в простое: Левое сопло в Белый в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Нагрев в простое: Правое сопло и шлем буфера
        
        RESPOND TYPE=command MSG="action:prompt_end"                               ; 🖥️ Закрываем окно проверки геометрии принтера
        RESPOND TYPE=command MSG="action:prompt_begin !Автоматическая загрузка!"   ; 🖥️ Окно индикации сервисного прогрева сопла в простое
        RESPOND TYPE=command MSG="action:prompt_text Греем сопло до 255°C для сервисной загрузки..." ; 💬 Инструкция пользователю
        RESPOND TYPE=command MSG="action:prompt_footer_button Отмена|_FS_STANDBY_CANCEL" ; 🕹️ Кнопка отмены заправки филамента в простое
        RESPOND TYPE=command MSG="action:prompt_show"                              ; 🖥️ Выводим готовое окно на KlipperScreen
        
        M104 S255                                                                 ; 🔥 Нагреваем хотенд Rapido 2 до сервисных 255°C
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM=180                               ; ⏳ Ждем прохождения порога размягчения пластика (180°C)
        G1 E3 F50                                                                 ; 🧵 Ленивый аккуратный зацеп прутка шестеренками экструдера
        M104 S255                                                                 ; 🔥 Нагреваем хотенд Rapido 2 до сервисных 255°C
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM=252 MAXIMUM=265                   ; ⏳ Жестко ждем полного прогрева экструдера головы
        
        # --- 🟠⚪ ПОДСВЕТКА ПОСЛЕ НАГРЕВА: Сопло нагрелось до 255°C -> Переходим в Оранжевый логотип, Сопла Белые ---
        SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟠 Удержание в простое: Оранжевый логотип в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Удержание в простое: Левое сопло в Белый в буфер
        SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Удержание в простое: Правое сопло и шлем буфера
        
        M83                                                                       ; ⚙️ Относительный режим счета шагов экструдера каретки
        G1 E50 F500                                                               ; 🧵 Продавливаем 50 мм нити для очистки сопла от старого цвета
        
        RESPOND TYPE=command MSG="action:prompt_end"                               ; 🖥️ Сбрасываем окно сервисного прогрева хотенда
        RESPOND TYPE=command MSG="action:prompt_begin !Автоматическая загрузка!"   ; 🖥️ Окно окончания заправки филамента в простое
        RESPOND TYPE=command MSG="action:prompt_text Пластик успешно заправлен. Очистите сопло." ; 💬 Инструкция пользователя на экране
        RESPOND TYPE=command MSG="action:prompt_footer_button Еще выдавить пластик?|_FS_PURGE_MORE" ; 🕹️ Кнопка добавочного плевка филамента
        RESPOND TYPE=command MSG="action:prompt_footer_button Завершить|_FS_STANDBY_FINISH" ; 🕹️ Кнопка окончания сервисной заправки прутка
        RESPOND TYPE=command MSG="action:prompt_footer_button Отмена|_FS_STANDBY_CANCEL" ; 🕹️ Кнопка отмены и выключения силового нагрева сопла
        RESPOND TYPE=command MSG="action:prompt_show"                              ; 🖥️ Выводим готовое окно управления на экран
    {% endif %}
# ============================================================================================================================
# 🕹️ ГРУППА: МАКРОСЫ ИНТЕРАКТИВНЫХ КНОПОК ДИАЛОГОВЫХ ОКОН MOONRAKER В СЦЕНАРИЯХ ФИЛАМЕНТА (ЧАСТЬ 2.2)
# ============================================================================================================================

[gcode_macro _FS_PURGE_MORE]
description: 🕹️ Кнопка "Еще выдавить пластик" - продавливает дополнительные 40 мм филамента со скоростью F500
gcode:
    M83                                                                           ; ⚙️ Относительный режим позиционирования экструдера
    G1 E40 F500                                                                   ; 🧵 Продавливаем дополнительные 40 мм пластика через хотенд
    M400                                                                          ; ⏳ Ожидаем полного окончания вращения шестерен Clockwork 2


[gcode_macro _FS_RESUME_PRINT]
description: 🕹️ Кнопка "Завершить" при печати - финальный плевок, сброс давления и возврат каретки на модель
gcode:
    M83                                                                           ; ⚙️ Относительные координаты для экструдера головы
    G1 E40.0 F500                                                                 ; 🧵 Делаем финальный очищающий плевок 40 мм на месте парковки
    M400                                                                          ; ⏳ Ждем окончания вращения подающего механизма экструдера
    G4 P1000                                                                      ; ⏳ Удерживаем паузу 1 секунду для снятия давления в сопле

    RESPOND TYPE=command MSG="action:prompt_end"                                  ; 🖥️ Закрываем интерактивное диалоговое окно Moonraker
    
    # --- 🔵⚪ УПРАВЛЕНИЕ ПОДСВЕТКОЙ: Возврат в режим Печати (Логотип Синий, Сопла Белые) ---
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Возвращаем ваш фирменный синий цвет на логотип
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 TRANSMIT=0 ; ⚪ Включаем чистый белый свет на левом сопле
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=3 TRANSMIT=1 ; ⚪ Включаем чистый белый свет на правом сопле и шлем
    
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=sensor_triggered VALUE=1            ; 💾 Включаем флаг-маркер автоматического прохождения прокачки
    RESUME                                                                        ; 🚀 Вызов макроса RESUME для возврата головы на деталь модели


[gcode_macro _FS_CANCEL_PRINT]
description: 🕹️ Кнопка "Отмена" при печати - закрывает окно диалога и гасит сопло через системный сброс
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"                                  ; 🖥️ Принудительно закрываем окно диалога на экране
    M82                                                                           ; ⚙️ Переводим экструдер в абсолютный режим счета шагов
    CANCEL_PRINT                                                                  ; 🚀 Вызов макроса CANCEL_PRINT для безопасной эвакуации головы


[gcode_macro _FS_STANDBY_FINISH]
description: 🕹️ Кнопка "Завершить" в простое - закрывает окно, остужает сопло до 180°C и включает синий свет простоя
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"                                  ; 🖥️ Закрываем интерактивное сервисное окно Moonraker
    M117 Cooling down to 180C...                                                   ; 💬 Текст о начале охлаждения экструдера в статус-бар
    M104 S0                                                                       ; 🔥 Полностью отключаем нагревательный картридж Rapido 2
    M106 S255                                                                     ; 🌪️ Разгоняем вентилятор обдува модели на 100% мощности
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=180                                  ; ⏳ Блокируем макрос до падения температуры сопла ниже 180°C
    M107                                                                          ; 🌪️ Полностью выключаем вентилятор обдува модели
    
    # --- 🔵 УПРАВЛЕНИЕ ПОДСВЕТКОЙ: Возврат в простой (Вся голова горит вашим фирменным Синим) ---
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Возвращаем синий цвет на логотип в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🔵 Возвращаем синий цвет на левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🔵 Возвращаем синий цвет на правое сопло и шлем буфер
    M117 Filament loaded. Standby ready.                                          ; 💬 Вывод финального текстового сообщения готовности принтера


[gcode_macro _FS_STANDBY_CANCEL]
description: 🕹️ Кнопка "Отмена" в простое - гасит сопло кулером до 180°C и включает синюю подсветку всей каретки
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"                                  ; 🖥️ Принудительно закрываем окно сервисного диалога на экране
    M117 Action canceled. Cooling to 180C...                                      ; 💬 Вывод текста об отмене заправки филамента в простое
    M104 S0                                                                       ; 🔥 Отключаем нагреватель экструдера инструментальной головы
    M106 S255                                                                     ; 🌪️ Врубаем вентилятор обдува модели на полную мощность
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=180                                  ; ⏳ Ждем падения температуры датчика сопла ниже 180°C
    M107                                                                          ; 🌪️ Выключаем вентилятор обдува модели
    
    # --- 🔵 УПРАВЛЕНИЕ ПОДСВЕТКОЙ: Возврат в простой (Вся голова горит вашим фирменным Синим) ---
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🔵 Возвращаем синий цвет на логотип в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🔵 Возвращаем синий цвет на левое сопло в буфер
    SET_LED LED=hotend_rgb RED=0.0 GREEN=0.0 BLUE=1.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🔵 Возвращаем синий цвет на правое сопло и шлем буфер
    M117 Loading canceled. Heater Off.                                            ; 💬 Текст в статусную строку об успешной отмене операции


# ============================================================================================================================
# 🧵 ГРУППА: БЫСТРАЯ РУЧНАЯ ЗАМЕНА, ЗАГРУЗКА И ВЫГРУЗКА ФИЛАМЕНТА ИЗ ИНТЕРФЕЙСА (ОРАНЖЕВЫЙ МОНОЛИТ В ПРОСТОЕ)
# ============================================================================================================================

[gcode_macro UNLOAD_FILAMENT]
description: 🟠 Быстрая и безопасная выгрузка филамента из Rapido 2 без образования пробок (Оранжевый монолит)
gcode:
    {% set target_temp = params.TEMP|default(230)|int %}                          ; 🌡️ Рабочая температура выгрузки по умолчанию (230°C)
    SAVE_GCODE_STATE NAME=unload_state                                           ; 💾 Снимок режимов позиционирования осей перед тестом

    # --- 🟠 НАЧАЛО: Включаем оранжевый монолит на всей каретке Stealthburner ---
    SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟠 Выгрузка: Оранжевый цвет логотипа в буфер
    SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🟠 Выгрузка: Оранжевое левое сопло в буфер
    SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🟠 Выгрузка: Оранжевое правое сопло и шлем буфер
    
    {% if printer.extruder.temperature < target_temp %}
        M117 Heating extruder to {target_temp}C...                                 ; 💬 Вывод текста о начале прогрева сопла для выгрузки
        M109 S{target_temp}                                                       ; 🔥 Нагреваем экструдер до целевой точки и удерживаем тепло
    {% endif %}
    
    M117 Unloading filament...                                                     ; 💬 Вывод сообщения о начале физического извлечения нити
    M83                                                                           ; ⚙️ Относительный режим позиционирования оси экструдера
    
    # Алгоритм бережного формирования аккуратного кончика прутка (Tip Forming)
    G1 E10 F300                                                                   ; 🧵 Короткий толчок вперед на 10 мм для оплавления наплыва пробки
    G1 E-5 F3000                                                                  ; 🏎️ РЕЗКИЙ короткий откат назад на 5 мм (срываем горячую нить)
    G4 P2000                                                                      ; ⏳ Замораживаем экструдер на 2 секунды для застывания кончика шариком
    G1 E-80 F2000                                                                 ; 🚀 Скоростной вывод 80 мм прутка наружу из редуктора экструдера
    
    M400                                                                          ; ⏳ Дожидаемся полного окончания физического вращения шестерен
    M117 Filament Unloaded!                                                       ; 💬 Текст в статус-бар об успешном извлечении филамента
    
    # --- ФИНАЛ: Свет НЕ меняется, остаётся Оранжевым маркером успешного завершения ---
    RESTORE_GCODE_STATE NAME=unload_state                                         ; 💾 Полное восстановление исходного состояния осей принтера


[gcode_macro LOAD_FILAMENT]
description: 🟠 Быстрая загрузка филамента и плавная промывка сопла Rapido 2 (Оранжевый монолит)
gcode:
    {% set target_temp = params.TEMP|default(230)|int %}                          ; 🌡️ Рабочая температура заправки по умолчанию (230°C)
    SAVE_GCODE_STATE NAME=load_state                                             ; 💾 Снимок режимов позиционирования осей перед стартом

    # --- 🟠 НАЧАЛО: Включаем оранжевый монолит на всей каретке Stealthburner ---
    SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=1 TRANSMIT=0 ; 🟠 Загрузка: Оранжевый цвет логотипа в буфер
    SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=2 TRANSMIT=0 ; 🟠 Загрузка: Оранжевое левое сопло в буфер
    SET_LED LED=hotend_rgb RED=1.0 GREEN=0.45 BLUE=0.0 WHITE=0.0 INDEX=3 TRANSMIT=1 ; 🟠 Загрузка: Оранжевое правое сопло и шлем буфер
    
    {% if printer.extruder.temperature < target_temp %}
        M117 Heating extruder to {target_temp}C...                                 ; 💬 Вывод сообщения о подготовке тепла сопла к заправке
        M104 S{target_temp}                                                       ; 🔥 Включаем силовой нагрев экструдера головы без блокировки
        M109 S{target_temp}                                                       ; ⏳ Ждем окончательной стабилизации рабочей температуры Rapido 2
    {% endif %}
    
    M117 Loading filament...                                                       ; 💬 Вывод сообщения о начале физической подачи прутка пластика
    M83                                                                           ; ⚙️ Переводим экструдер в относительный режим счета шагов
    
    G1 E60 F1500                                                                  ; 🚀 Скоростной затяг прутка на первые 60 мм через тракт трубки
    G1 E50 F160                                                                   ; 🧵 Медленное ультра-плавное продавливание 50 мм для смены цвета
    
    M400                                                                          ; ⏳ Ждем полного окончания экструзии и падения давления в сопле
    M117 Filament Loaded!                                                         ; 💬 Текст в статусную строку об успешном окончании загрузки прутка
    
    # --- ФИНАЛ: Свет НЕ меняется, остаётся Оранжевым маркером успешного завершения ---
    RESTORE_GCODE_STATE NAME=load_state                                           ; 💾 Полное восстановление исходных режимов осей принтера
